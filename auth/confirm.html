<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing in... | Glotix</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #fafafa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .box { text-align: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e5e7eb; border-top-color: #0f0f10; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { color: #6b7280; font-size: 1rem; font-weight: 500; }
    </style>
</head>
<body>
<div class="box">
    <div class="spinner"></div>
    <p>Signing you in...</p>
</div>

<script src="/js/config.js"></script>
<script>
(async function() {
    // تم إضافة flowType: 'implicit' ✅
    const supa = window.supabase.createClient(
        window.APP_CONFIG.SUPABASE_URL,
        window.APP_CONFIG.SUPABASE_KEY,
        { auth: { flowType: 'implicit' } }
    );

    async function saveAndRedirect(session) {
        localStorage.setItem('token', session.access_token);

        let credits = '...';
        try {
            const res = await fetch(window.APP_CONFIG.API_BASE + '/api/user/credits', {
                headers: { 'Authorization': `Bearer ${session.access_token}` }
            });
            if (res.ok) {
                const d = await res.json();
                if (d.success) credits = d.credits;
            }
        } catch(e) {}

        const meta = session.user.user_metadata || {};
        const userData = {
            id:      session.user.id,
            email:   session.user.email,
            name:    meta.full_name || meta.name || session.user.email.split('@')[0],
            avatar:  meta.avatar_url || meta.picture ||
                     `https://ui-avatars.com/api/?name=${encodeURIComponent(
                         session.user.email.split('@')[0]
                     )}&background=0f0f10&color=fff&size=64`,
            credits: credits
        };

        localStorage.setItem('sl_user_cache', JSON.stringify(userData));
        window.location.replace('/');
    }

    // طريقة 1: قراءة الجلسة من الـ hash مباشرة
    const hash = window.location.hash;
    if (hash && hash.includes('access_token')) {
        // Supabase يقرأ الـ hash تلقائياً عند إنشاء الـ client
        const { data: { session } } = await supa.auth.getSession();
        if (session) {
            await saveAndRedirect(session);
            return;
        }
    }

    // طريقة 2: انتظار SIGNED_IN event
    supa.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' && session) {
            await saveAndRedirect(session);
        }
    });

    // طريقة 3: إذا لم تنجح خلال 4 ثوان، تحقق مرة أخيرة
    setTimeout(async () => {
        const { data: { session } } = await supa.auth.getSession();
        if (session) {
            await saveAndRedirect(session);
        } else {
            window.location.replace('/');
        }
    }, 4000);

})();
</script>
</body>
</html>
