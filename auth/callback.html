<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing in... | Glotix</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #fafafa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .box { text-align: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e5e7eb; border-top-color: #0f0f10; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { color: #6b7280; font-size: 1rem; font-weight: 500; }
    </style>
</head>
<body>
<div class="box">
    <div class="spinner"></div>
    <p>Signing you in...</p>
</div>

<script src="/js/config.js"></script>
<script>
(async function() {
    const supa = window.supabase.createClient(
        window.APP_CONFIG.SUPABASE_URL,
        window.APP_CONFIG.SUPABASE_KEY
    );

    // انتظر Supabase يعالج الـ hash ويحفظ الجلسة
    supa.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' && session) {
            // حفظ التوكن
            localStorage.setItem('token', session.access_token);

            // جلب الرصيد
            let credits = '...';
            try {
                const res = await fetch(window.APP_CONFIG.API_BASE + '/api/user/credits', {
                    headers: { 'Authorization': `Bearer ${session.access_token}` }
                });
                if (res.ok) {
                    const d = await res.json();
                    if (d.success) credits = d.credits;
                }
            } catch(e) {}

            // حفظ بيانات المستخدم
            const meta = session.user.user_metadata || {};
            const userData = {
                id:      session.user.id,
                email:   session.user.email,
                name:    meta.full_name || meta.name || session.user.email.split('@')[0],
                avatar:  meta.avatar_url || meta.picture ||
                         `https://ui-avatars.com/api/?name=${encodeURIComponent(
                             session.user.email.split('@')[0]
                         )}&background=0f0f10&color=fff&size=64`,
                credits: credits
            };
            localStorage.setItem('sl_user_cache', JSON.stringify(userData));

            // توجيه للرئيسية
            localStorage.setItem('sl_user_cache', JSON.stringify(userData));
await new Promise(r => setTimeout(r, 200)); // انتظر قليلاً
window.location.replace('/');
        }
    });

    // fallback: إذا لم يُطلق الـ event بعد 5 ثوان
    setTimeout(() => {
        window.location.replace('/');
    }, 5000);
})();
</script>
</body>
</html>
