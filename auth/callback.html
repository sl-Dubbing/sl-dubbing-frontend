<script>
(async function() {
    // تهيئة Supabase مع تحديد Implicit Flow ليتوافق مع login.html ✅
    const supa = window.supabase.createClient(
        window.APP_CONFIG.SUPABASE_URL,
        window.APP_CONFIG.SUPABASE_KEY,
        { auth: { flowType: 'implicit' } }
    );

    async function saveAndRedirect(session) {
        localStorage.setItem('token', session.access_token);

        let credits = '...';
        try {
            const res = await fetch(window.APP_CONFIG.API_BASE + '/api/user/credits', {
                headers: { 'Authorization': `Bearer ${session.access_token}` }
            });
            if (res.ok) {
                const d = await res.json();
                if (d.success) credits = d.credits;
            }
        } catch(e) {}

        const meta = session.user.user_metadata || {};
        const userData = {
            id:      session.user.id,
            email:   session.user.email,
            name:    meta.full_name || meta.name || session.user.email.split('@')[0],
            avatar:  meta.avatar_url || meta.picture ||
                     `https://ui-avatars.com/api/?name=${encodeURIComponent(
                         session.user.email.split('@')[0]
                     )}&background=0f0f10&color=fff&size=64`,
            credits: credits
        };

        localStorage.setItem('sl_user_cache', JSON.stringify(userData));
        window.location.replace('/');
    }

    const hash = window.location.hash;
    if (hash && hash.includes('access_token')) {
        const { data: { session } } = await supa.auth.getSession();
        if (session) {
            await saveAndRedirect(session);
            return;
        }
    }

    supa.auth.onAuthStateChange(async (event, session) => {
        if (event === 'SIGNED_IN' && session) {
            await saveAndRedirect(session);
        }
    });

    setTimeout(async () => {
        const { data: { session } } = await supa.auth.getSession();
        if (session) {
            await saveAndRedirect(session);
        } else {
            window.location.replace('/');
        }
    }, 4000);

})();
</script>
