name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build static site
        env:
          PUBLIC_API_BASE: https://glotix-api-production.up.railway.app
          PUBLIC_SUPABASE_URL: https://ckjkkxrlgisjdolwddfg.supabase.co
          PUBLIC_SUPABASE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNramtreHJsZ2lzamRvbHdkZGZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjU0OTUsImV4cCI6MjA5MzA0MTQ5NX0.F-4TbmO6_7plPm8NBr_6djCv6gtEPpWFw9J7m8vTs6M
          PUBLIC_USE_GO_GATEWAY: 'false'
          PUBLIC_DUB_USE_SSE: 'true'
          PUBLIC_VOICE_CLONE_CREDIT_COST: '100'
        run: npm run build
      - name: Ensure Pages markers
        run: |
          printf 'glotix.ai\n' > build/CNAME
          touch build/.nojekyll
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          cname: glotix.ai
          force_orphan: true
