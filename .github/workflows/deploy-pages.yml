name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble legacy static site
        run: |
          mkdir -p site
          cp -r legacy/*.html site/
          cp -r legacy/css site/css
          cp -r legacy/js site/js
          mkdir -p site/auth
          cp legacy/auth/confirm.html site/auth/confirm.html
          cp -r icon-index site/icon-index
          cp -r logo site/logo
          cp -r demo site/demo
          cp robots.txt sitemap.xml site/ 2>/dev/null || true
          printf 'glotix.ai\n' > site/CNAME
          touch site/.nojekyll
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          cname: glotix.ai
          force_orphan: true
