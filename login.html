<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glotix | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-page: #fafafa;
            --bg-card: #ffffff;
            --border-color: #e5e7eb;
            --text-main: #0f0f10;
            --text-muted: #6b7280;
            --primary: #0f0f10;
            --primary-hover: #27272a;
            --accent-blue: #007aff;
            --accent-green: #10b981;
            --error: #ef4444;
            --radius-md: 12px;
            --radius-lg: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg-page); color: var(--text-main); min-height: 100vh; overflow-x: hidden; line-height: 1.5; }
        .page { max-width: 1200px; margin: 0 auto; padding: 20px 3%; }

        /* ── Header ── */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 0 40px; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 1.6rem; font-weight: 900; text-decoration: none; color: var(--text-main); letter-spacing: -0.5px; }
        .logo svg { width: 36px; height: 36px; }

        /* ── Login Card ── */
        .login-wrapper { display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 120px); padding-bottom: 60px; }
        .login-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 48px 40px; width: 100%; max-width: 440px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .login-card h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; text-align: center; }
        .login-card .subtitle { color: var(--text-muted); text-align: center; margin-bottom: 32px; font-size: 0.95rem; }

        /* ── OAuth Button ── */
        .oauth-btn { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-page); color: var(--text-main); font-weight: 600; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; margin-bottom: 24px; }
        .oauth-btn:hover { background: #f3f4f6; border-color: #d1d5db; }
        .oauth-btn i { font-size: 1.1rem; }

        /* ── Divider ── */
        .divider { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; color: var(--text-muted); font-size: 0.85rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border-color); }

        /* ── Form ── */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
        .form-group input { width: 100%; padding: 14px 16px; border: 1px solid var(--border-color); border-radius: 12px; font-size: 0.95rem; outline: none; transition: 0.2s; background: var(--bg-page); color: var(--text-main); }
        .form-group input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }

        .login-btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; margin-top: 8px; }
        .login-btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .signup-link { text-align: center; margin-top: 24px; color: var(--text-muted); font-size: 0.9rem; }
        .signup-link a { color: var(--accent-blue); text-decoration: none; font-weight: 600; }
        .signup-link a:hover { text-decoration: underline; }

        /* ── Error Message ── */
        .error-msg { background: #fee2e2; color: #dc2626; padding: 12px 16px; border-radius: 10px; font-size: 0.9rem; font-weight: 500; margin-bottom: 20px; display: none; align-items: center; gap: 8px; }
        .error-msg.show { display: flex; }

        /* ── Loading Spinner ── */
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) {
            .login-card { padding: 32px 24px; }
        }
    </style>
</head>
<body>

<div class="page">
    <header class="top-bar">
        <a class="logo" href="/">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M16 3C8.82 3 3 8.82 3 16C3 23.18 8.82 29 16 29C23.18 29 29 23.18 29 16V14H16V19H23.2C22.1 22.1 19.3 24 16 24C11.58 24 8 20.42 8 16C8 11.58 11.58 8 16 8C18.4 8 20.5 9.06 21.8 10.74L25.4 7.14C22.9 4.6 19.6 3 16 3Z" fill="#0f0f10"/>
                <path d="M29 16C29 23.18 23.18 29 16 29V24C19.3 24 22.1 22.1 23.2 19H29V16Z" fill="#007aff"/>
            </svg>
            Glotix
        </a>
    </header>

    <div class="login-wrapper">
        <div class="login-card">
            <h1>Welcome Back</h1>
            <p class="subtitle">Sign in to your account to continue</p>

            <div class="error-msg" id="errorMsg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <button class="oauth-btn" id="googleBtn" onclick="signInWithGoogle()">
                <i class="fab fa-google" style="color: #ea4335;"></i>
                Continue with Google
            </button>

            <div class="divider">or continue with email</div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    Sign In
                </button>
            </form>

            <p class="signup-link">
                Don't have an account? <a href="#" id="signupLink">Sign up</a>
            </p>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script>
// ── Supabase Setup ──
// ⚠️ مهم: نستخدم اسم مختلف (supaClient) لتجنب التعارض مع window.supabase من CDN
const SUPABASE_URL = window.APP_CONFIG?.SUPABASE_URL || 'https://ckjkkxrlgisjdolwddfg.supabase.co';
const SUPABASE_KEY = window.APP_CONFIG?.SUPABASE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNramtreHJsZ2lzamRvbHdkZGZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjU0OTUsImV4cCI6MjA5MzA0MTQ5NX0.F-4TbmO6_7plPm8NBr_6djCv6gtEPpWFw9J7m8vTs6M';

// فحص توفر مكتبة Supabase
if (typeof window.supabase === 'undefined') {
    showError('Failed to load Supabase library. Please refresh the page.');
}

// إنشاء client باسم مختلف تماماً عن 'supabase'
const supaClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
        flowType: 'pkce',
        detectSessionInUrl: true,
        persistSession: true
    }
});

let _redirectingAfterAuth = false;
function persistSessionAndGoHome(session) {
    if (!session || _redirectingAfterAuth) return;
    _redirectingAfterAuth = true;
    localStorage.setItem('token', session.access_token);
    if (window.location.hash) {
        history.replaceState(null, '', window.location.pathname + window.location.search);
    }
    window.location.href = '/';
}

// ── OAuth return: tokens in URL hash (Google → redirectTo login.html) ──
if (window.location.hash && window.location.hash.includes('access_token')) {
    supaClient.auth.getSession().then(({ data: { session } }) => {
        if (session) persistSessionAndGoHome(session);
    });
    supaClient.auth.onAuthStateChange((event, session) => {
        if ((event === 'SIGNED_IN' || event === 'INITIAL_SESSION') && session) {
            persistSessionAndGoHome(session);
        }
    });
} else {
    // ── Check if already logged in ──
    supaClient.auth.getSession().then(({ data: { session } }) => {
        if (session) persistSessionAndGoHome(session);
    }).catch(() => {});
}

// ── Google OAuth ──
async function signInWithGoogle() {
    if (typeof window.supabase === 'undefined') {
        showError('Authentication library not loaded. Please refresh.');
        return;
    }
    const btn = document.getElementById('googleBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Redirecting...';

    try {
        const { error } = await supaClient.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: window.location.origin + '/auth/confirm.html'
            }
        });

        if (error) throw error;
    } catch (err) {
        showError(err.message || 'Google sign-in failed');
        btn.disabled = false;
        btn.innerHTML = '<i class="fab fa-google" style="color: #ea4335;"></i> Continue with Google';
    }
}

// ── Email/Password Login ──
async function handleLogin(e) {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    hideError();
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in...';

    try {
        const { data, error } = await supaClient.auth.signInWithPassword({
            email: email,
            password: password
        });

        if (error) throw error;

        if (data.session) {
            localStorage.setItem('token', data.session.access_token);
            window.location.href = '/';
        }
    } catch (err) {
        showError(err.message || 'Login failed');
        btn.disabled = false;
        btn.textContent = 'Sign In';
    }
}

// ── Error Handling ──
function showError(msg) {
    const el = document.getElementById('errorMsg');
    const txt = document.getElementById('errorText');
    if (el && txt) {
        txt.textContent = msg;
        el.classList.add('show');
    } else {
        alert(msg); // fallback
    }
}

function hideError() {
    const el = document.getElementById('errorMsg');
    if (el) el.classList.remove('show');
}

document.getElementById('signupLink')?.addEventListener('click', async function (e) {
    e.preventDefault();
    const email = document.getElementById('email')?.value?.trim();
    const password = document.getElementById('password')?.value;
    if (!email || !password || password.length < 6) {
        showError('Enter email and password (min 6 characters) to create an account.');
        return;
    }
    hideError();
    try {
        const { data, error } = await supaClient.auth.signUp({
            email,
            password,
            options: { emailRedirectTo: window.location.origin + '/auth/confirm.html' }
        });
        if (error) throw error;
        if (data.session) {
            persistSessionAndGoHome(data.session);
            return;
        }
        showError('Check your email to confirm your account, then sign in.');
    } catch (err) {
        showError(err.message || 'Sign up failed');
    }
});
</script>

</body>
</html>
