<script>
document.addEventListener('DOMContentLoaded', async () => {
    // تهيئة Supabase مع تحديد Implicit Flow ✅
    const supa = window.supabase.createClient(
        window.APP_CONFIG.SUPABASE_URL, 
        window.APP_CONFIG.SUPABASE_KEY,
        { auth: { flowType: 'implicit' } } 
    );

    const showLocalToast = (msg, type = 'info') => {
        const container = document.getElementById('toasts');
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.innerText = msg;
        container.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    };

    const { data: { session } } = await supa.auth.getSession();
    if (session) {
        window.location.replace('/');
        return;
    }

    document.getElementById('googleBtn').addEventListener('click', async () => {
        await supa.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin + '/auth/callback' }
        });
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('submitBtn');
        
        btn.textContent = 'Signing in...';
        btn.disabled = true;

        const { data, error } = await supa.auth.signInWithPassword({ email, password });

        if (error) {
            showLocalToast(error.message, 'error');
            btn.textContent = 'Sign in'; 
            btn.disabled = false;
        } else if (data?.session) {
            localStorage.setItem('token', data.session.access_token);
            
            let userCredits = '...';
            try {
                const res = await fetch(window.APP_CONFIG.API_BASE + '/api/user/credits', {
                    headers: { 'Authorization': `Bearer ${data.session.access_token}` }
                });
                if (res.ok) {
                    const d = await res.json();
                    if (d.success) userCredits = d.credits;
                }
            } catch(err) {}

            const meta = data.user.user_metadata || {};
            const userData = {
                id: data.user.id,
                email: data.user.email,
                name: meta.full_name || data.user.email.split('@')[0],
                avatar: meta.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.user.email.split('@')[0])}&background=0f0f10&color=fff&size=64`,
                credits: userCredits
            };

            localStorage.setItem('sl_user_cache', JSON.stringify(userData));
            showLocalToast('Success! Redirecting...', 'success');
            setTimeout(() => window.location.replace('/'), 500);
        }
    });
});
</script>
