<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in | sl-Dubbing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root {
            --bg-dark: #0b1020;
            --card-bg: rgba(255,255,255,0.04);
            --border-color: rgba(167,139,250,0.15);
            --border-focus: #7c3aed;
            --accent: #7c3aed;
            --accent-hover: #2563eb;
            --text-main: #e6e7ff;
            --text-muted: #9ca3af;
            --gold: #ffb800;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .login-container { 
            width: 100%; max-width: 400px; padding: 40px; display: flex; flex-direction: column; 
            background: var(--card-bg); border: 1px solid var(--border-color); 
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }

        .logo { text-align: center; font-size: 1.5rem; font-weight: 800; margin-bottom: 20px; color: var(--gold); text-decoration: none; }
        .logo span { font-weight: 900; margin-right: 5px; color: var(--text-main); }
        .title { text-align: center; font-size: 1.5rem; font-weight: 700; margin-bottom: 30px; color: #fff; }

        .oauth-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .divider { height: 1px; background-color: var(--border-color); margin-bottom: 25px; position: relative; }
        .divider::after {
            content: "OR"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--bg-dark); padding: 0 10px; color: var(--text-muted); font-size: 0.8rem;
        }

        .form-group { margin-bottom: 20px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
        .forgot-link { font-size: 0.8rem; color: var(--accent); text-decoration: none; transition: 0.3s; }
        .forgot-link:hover { color: var(--gold); }
        
        input[type="email"], input[type="password"] { 
            width: 100%; height: 48px; padding: 0 16px; background: rgba(0,0,0,0.3); color: #fff;
            border: 1px solid var(--border-color); border-radius: var(--radius); font-size: 1rem; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2); }
        
        /* 🟢 تنسيق زر تذكرني الجديد */
        .remember-row { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; cursor: pointer; }
        .remember-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
        
        .submit-btn { 
            width: 100%; height: 48px; background: linear-gradient(135deg, var(--accent), var(--accent-hover)); 
            color: #fff; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: bold; 
            cursor: pointer; margin-top: 10px; transition: 0.3s; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5); }

        .footer-text { text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-muted); }
        .footer-text a { font-weight: 600; text-decoration: none; color: var(--accent); transition: 0.3s; }
        .footer-text a:hover { color: var(--gold); }
        .google-btn-wrapper { width: 100%; display: flex; justify-content: center; }
    </style>
</head>
<body>

<div class="login-container">
    <a href="index.html" class="logo"><span>||</span>sl-Dubbing</a>
    <h1 class="title">Welcome back</h1>

    <div class="oauth-group">
        <div class="google-btn-wrapper" id="googleBtn"></div>
    </div>

    <div class="divider"></div>

    <form id="loginForm">
        <div class="form-group">
            <div class="label-row"><label for="email">Email</label></div>
            <input type="email" id="email" placeholder="name@company.com" required>
        </div>

        <div class="form-group">
            <div class="label-row">
                <label for="password">Password</label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            <input type="password" id="password" required>
        </div>

        <!-- 🟢 خيار تذكرني -->
        <label class="remember-row">
            <input type="checkbox" id="rememberMe" checked>
            <span>Remember me</span>
        </label>

        <button type="submit" class="submit-btn">Sign in</button>
    </form>
    <p class="footer-text">Don't have an account? <a href="https://accounts.google.com/signup" target="_blank">Sign up</a></p>
</div>

<script>
    const GOOGLE_CLIENT_ID = "497619073475-6vjelufub8gci231ettdhmk5pv0cdde3.apps.googleusercontent.com";
    const API_BASE = "https://web-production-14a1.up.railway.app";

    window.onload = function () {
        google.accounts.id.initialize({
            client_id: GOOGLE_CLIENT_ID,
            callback: handleGoogleResponse
        });
        
        google.accounts.id.renderButton(
            document.getElementById("googleBtn"),
            { theme: "filled_black", size: "large", width: 320 }
        );
    };

    async function handleGoogleResponse(response) {
        try {
            const res = await fetch(`${API_BASE}/api/auth/google`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ credential: response.credential })
            });
            const data = await res.json();
            
            if (data.success) {
                // 🟢 1. التحقق من خيار "تذكرني"
                const remember = document.getElementById('rememberMe').checked;
                const storage = remember ? localStorage : sessionStorage;

                // تنظيف الذاكرة القديمة لمنع التضارب
                localStorage.removeItem('token');
                localStorage.removeItem('sl_user');
                sessionStorage.removeItem('token');
                sessionStorage.removeItem('sl_user');

                // 🟢 2. حفظ التوكن وبيانات المستخدم المركزية
                if (data.token) storage.setItem('token', data.token);
                if (data.user) storage.setItem('sl_user', JSON.stringify(data.user));

                // 🟢 3. التوجيه الذكي (إلى الصفحة التي طلبها المستخدم، أو الدبلجة كافتراضي)
                const targetPage = sessionStorage.getItem('returnUrl') || 'dubbing.html';
                sessionStorage.removeItem('returnUrl'); // مسح الرابط من الذاكرة بعد استخدامه
                
                window.location.href = targetPage;
            } else {
                alert("Login failed: " + data.error);
            }
        } catch (err) {
            alert("Connection error. Make sure the server is running.");
        }
    }

    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        alert("يرجى استخدام تسجيل الدخول بحساب جوجل حالياً.");
    });
</script>
</body>
</html>
