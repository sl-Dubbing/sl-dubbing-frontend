<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | sl-Dubbing</title>

    <!-- أيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- استدعاء مكتبة Supabase (v2) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <!-- ⚠️ مفتاح Supabase من ملف منفصل (لا ترفعه على GitHub) -->
    <script src="js/config.js"></script>

    <style>
        :root {
            --bg-dark: #000000;
            --card-bg: rgba(255,255,255,0.03);
            --border-color: rgba(255,255,255,0.06);
            --border-focus: #ffffff;
            --accent: #ffffff;
            --accent-hover: #e6e6e6;
            --text-main: #ffffff;
            --text-muted: #bdbdbd;
            --error: #ff3b30;
            --success: #34c759;
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        html, body { height: 100%; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-container { width: 100%; max-width: 420px; padding: 36px; display: flex; flex-direction: column; background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); border: 1px solid var(--border-color); border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.7); backdrop-filter: blur(6px); }
        .logo { text-align: center; font-size: 1.25rem; font-weight: 800; margin-bottom: 12px; color: var(--text-main); text-decoration: none; }
        .logo span { font-weight: 900; margin-left: 6px; color: var(--text-muted); }
        .title { text-align: center; font-size: 1.4rem; font-weight: 700; margin-bottom: 20px; color: var(--text-main); }
        .oauth-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; align-items: center; }
        .btn-google { width: 100%; height: 46px; border-radius: 10px; border: 1px solid var(--border-color); background: #ffffff; color: #000000; font-weight: 700; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; }
        .btn-google:hover { background: #e6e6e6; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,255,255,0.1); }
        .btn-google img { width: 20px; }
        .divider { height: 1px; background-color: var(--border-color); margin: 20px 0; position: relative; }
        .divider::after { content: "أو"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-dark); padding: 0 10px; color: var(--text-muted); font-size: 0.85rem; }
        .form-group { margin-bottom: 16px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        label { font-size: 0.9rem; font-weight: 600; color: var(--text-muted); }
        .forgot-link { font-size: 0.85rem; color: var(--accent); text-decoration: none; transition: 0.2s; }
        .forgot-link:hover { color: var(--accent-hover); }
        input[type="email"], input[type="password"] { width: 100%; height: 46px; padding: 0 14px; background: rgba(255,255,255,0.02); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 10px; font-size: 1rem; outline: none; transition: 0.18s; }
        input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 4px rgba(255,255,255,0.06); }
        input.error { border-color: var(--error); box-shadow: 0 0 0 4px rgba(255,59,48,0.15); }
        .error-msg { color: var(--error); font-size: 0.78rem; margin-top: 4px; display: none; }
        .error-msg.visible { display: block; }
        .remember-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; cursor: pointer; user-select: none; }
        .remember-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
        .submit-btn { width: 100%; height: 46px; background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05)); color: #ffffff; border: 1px solid var(--border-color); border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 6px; transition: 0.18s; }
        .submit-btn:hover { background: rgba(255,255,255,0.15); border-color: #ffffff; }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .footer-text { text-align: center; margin-top: 18px; font-size: 0.9rem; color: var(--text-muted); }
        .footer-text a { font-weight: 600; text-decoration: none; color: var(--accent); transition: 0.18s; }
        .footer-text a:hover { color: var(--accent-hover); }
        /* Toast notification */
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(28,28,30,0.92); backdrop-filter: blur(20px); color: white; padding: 11px 22px; border-radius: var(--radius); z-index: 9999; font-weight: 500; font-size: 0.88rem; box-shadow: 0 20px 48px rgba(0,0,0,0.12); animation: slideUp 0.4s cubic-bezier(0.32,0.72,0,1); }
        .toast.error { background: rgba(255,59,48,0.92); }
        .toast.success { background: rgba(48,209,88,0.92); }
        @keyframes slideUp { from { opacity: 0; transform: translate(-50%,20px); } to { opacity: 1; transform: translate(-50%,0); } }
        @media (max-width: 420px) { .login-container { padding: 20px; } }
    </style>
</head>
<body>

<div class="login-container" role="main" aria-labelledby="pageTitle">
    <a href="index.html" class="logo" aria-label="sl-Dubbing home">sl-Dubbing <span>||</span></a>
    <h1 id="pageTitle" class="title">مرحباً بعودتك</h1>

    <div class="oauth-group">
        <button type="button" class="btn-google" id="googleBtn" aria-label="تسجيل الدخول عبر جوجل">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google Logo" loading="lazy" />
            المتابعة باستخدام جوجل
        </button>
    </div>

    <div class="divider" aria-hidden="true"></div>

    <form id="loginForm" novalidate>
        <div class="form-group">
            <div class="label-row">
                <label for="email">البريد الإلكتروني</label>
            </div>
            <input type="email" id="email" name="email" placeholder="name@company.com" required autocomplete="email" aria-required="true" aria-describedby="emailError">
            <div class="error-msg" id="emailError" role="alert" aria-live="polite">يرجى إدخال بريد إلكتروني صحيح</div>
        </div>

        <div class="form-group">
            <div class="label-row">
                <label for="password">كلمة المرور</label>
                <a href="forgot.html" class="forgot-link" id="forgotLink" rel="noopener noreferrer">نسيت كلمة المرور؟</a>
            </div>
            <input type="password" id="password" name="password" required autocomplete="current-password" aria-required="true" aria-describedby="passwordError" minlength="6">
            <div class="error-msg" id="passwordError" role="alert" aria-live="polite">كلمة المرور يجب أن تكون 6 أحرف على الأقل</div>
        </div>

        <div class="remember-row">
            <input type="checkbox" id="rememberMe" name="rememberMe" checked>
            <label for="rememberMe">تذكرني</label>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn" aria-label="تسجيل الدخول">تسجيل الدخول</button>
    </form>

    <p class="footer-text">لا تملك حساباً؟ <a href="register.html" rel="noopener noreferrer">إنشاء حساب</a></p>
</div>

<div id="toasts" aria-live="polite" aria-atomic="true"></div>

<script>
(function() {
    'use strict';

    const SUPABASE_URL = 'https://ckjkkxrlgisjdolwddfg.supabase.co';
    const SUPABASE_KEY = window.__SUPABASE_KEY__ || '';

    // Validation helpers
    function isValidEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function showToast(msg, type) {
        const container = document.getElementById('toasts');
        const box = document.createElement('div');
        box.className = 'toast ' + (type || '');
        box.textContent = msg;
        container.appendChild(box);
        setTimeout(() => box.remove(), 4000);
    }

    function setFieldError(fieldId, show) {
        const field = document.getElementById(fieldId);
        const error = document.getElementById(fieldId + 'Error');
        if (show) {
            field.classList.add('error');
            error.classList.add('visible');
        } else {
            field.classList.remove('error');
            error.classList.remove('visible');
        }
    }

    function clearErrors() {
        setFieldError('email', false);
        setFieldError('password', false);
    }

    // Initialize Supabase
    let supabaseClient = null;
    function getSupabase() {
        if (supabaseClient) return supabaseClient;
        if (!SUPABASE_KEY) {
            showToast('مفتاح Supabase غير مُعد. تواصل مع المشرف.', 'error');
            throw new Error('Supabase key not configured');
        }
        if (!window.supabase) {
            showToast('فشل تحميل مكتبة Supabase. أعد تحميل الصفحة.', 'error');
            throw new Error('Supabase SDK not loaded');
        }
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        return supabaseClient;
    }

    // Check existing session
    async function checkSession() {
        try {
            const supa = getSupabase();
            const { data, error } = await supa.auth.getSession();
            if (error) throw error;
            if (data?.session) {
                localStorage.setItem('token', data.session.access_token);
                window.location.href = 'index.html';
            }
        } catch (e) {
            console.error('Session check failed:', e);
        }
    }

    // Google sign in
    async function signInWithGoogle() {
        try {
            const supa = getSupabase();
            const redirectTo = window.location.origin + window.location.pathname.replace('login.html', 'index.html');
            const { data, error } = await supa.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo }
            });
            if (error) throw error;
            if (data?.url) window.location.href = data.url;
        } catch (e) {
            console.error('Google sign-in failed:', e);
            showToast('فشل تسجيل الدخول عبر جوجل: ' + e.message, 'error');
        }
    }

    // Email/Password sign in
    async function signInWithEmail(e) {
        e.preventDefault();
        clearErrors();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const rememberMe = document.getElementById('rememberMe').checked;
        const btn = document.getElementById('submitBtn');

        let hasError = false;

        if (!email || !isValidEmail(email)) {
            setFieldError('email', true);
            hasError = true;
        }
        if (!password || password.length < 6) {
            setFieldError('password', true);
            hasError = true;
        }

        if (hasError) return;

        btn.textContent = 'جاري التحقق...';
        btn.disabled = true;

        try {
            const supa = getSupabase();
            const { data, error } = await supa.auth.signInWithPassword({ 
                email, 
                password,
                options: { remember: rememberMe }
            });

            if (error) {
                if (error.message.includes('Invalid login')) {
                    showToast('البريد الإلكتروني أو كلمة المرور غير صحيحة', 'error');
                } else {
                    showToast(error.message, 'error');
                }
                btn.textContent = 'تسجيل الدخول';
                btn.disabled = false;
                return;
            }

            if (data?.session) {
                localStorage.setItem('token', data.session.access_token);
                showToast('تم تسجيل الدخول بنجاح!', 'success');
                const targetPage = sessionStorage.getItem('returnUrl') || 'index.html';
                sessionStorage.removeItem('returnUrl');
                setTimeout(() => { window.location.href = targetPage; }, 500);
            }

        } catch (err) {
            console.error('Sign-in error:', err);
            showToast('حدث خطأ أثناء محاولة تسجيل الدخول', 'error');
            btn.textContent = 'تسجيل الدخول';
            btn.disabled = false;
        }
    }

    // Event listeners
    document.addEventListener('DOMContentLoaded', () => {
        checkSession();
        document.getElementById('googleBtn').addEventListener('click', signInWithGoogle);
        document.getElementById('loginForm').addEventListener('submit', signInWithEmail);
    });
})();
</script>
</body>
</html>
