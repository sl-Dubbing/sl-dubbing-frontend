<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in - sl-Dubbing</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body { background: #fafafa; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #111827; }
  
  .auth-card { background: #fff; width: 100%; max-width: 400px; padding: 40px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.04); text-align: center; }
  .logo { font-size: 1.5rem; font-weight: 900; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; gap: 10px; color: #0f0f10; text-decoration: none; }
  .logo i { color: #a4fec4; background: #0f0f10; padding: 6px; border-radius: 8px; }
  
  h1 { font-size: 1.6rem; margin-bottom: 30px; font-weight: 800; }
  
  /* أزرار التسجيل الاجتماعي */
  .social-btn { width: 100%; padding: 12px; margin-bottom: 12px; background: #fff; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; color: #374151; }
  .social-btn:hover { background: #f9fafb; border-color: #9ca3af; }
  .social-btn img { width: 20px; }
  
  .divider { display: flex; align-items: center; text-align: center; margin: 24px 0; color: #9ca3af; font-size: 0.85rem; }
  .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #e5e7eb; }
  .divider:not(:empty)::before { margin-right: .25em; }
  .divider:not(:empty)::after { margin-left: .25em; }
  
  /* الحقول التقليدية */
  .input-group { text-align: left; margin-bottom: 16px; }
  .input-group label { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: #374151; }
  .input-group a { color: #6b7280; text-decoration: none; font-weight: 500; font-size: 0.8rem; }
  .input-group a:hover { text-decoration: underline; }
  .input-group input { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem; outline: none; transition: border 0.2s; }
  .input-group input:focus { border-color: #0f0f10; box-shadow: 0 0 0 1px #0f0f10; }
  
  .submit-btn { width: 100%; padding: 14px; background: #9ca3af; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
  .submit-btn.active { background: #0f0f10; }
  .submit-btn.active:hover { background: #27272a; }
  
  .footer-text { margin-top: 24px; font-size: 0.9rem; color: #6b7280; }
  .footer-text a { color: #111827; font-weight: 600; text-decoration: none; }
  .footer-text a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="auth-card">
  <a href="index.html" class="logo"><i class="fas fa-cube"></i> sl-Dubbing</a>
  
  <h1>Welcome back</h1>
  
  <button class="social-btn" id="googleLogin">
    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
    Sign in with Google
  </button>
  
  <div class="divider">OR</div>
  
  <div class="input-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="name@company.com" oninput="checkForm()">
  </div>
  
  <div class="input-group">
    <label>Password <a href="#">Forgot your password?</a></label>
    <input type="password" id="password" placeholder="••••••••" oninput="checkForm()">
  </div>
  
  <button class="submit-btn" id="loginBtn" disabled>Sign in</button>
  
  <div class="footer-text">
    Don't have an account? <a href="signup.html">Sign up</a>
  </div>
</div>

<script>
  // تفعيل الزر فقط عند كتابة البريد وكلمة المرور
  function checkForm() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    
    if(email.length > 3 && pass.length > 5) {
      btn.disabled = false;
      btn.classList.add('active');
    } else {
      btn.disabled = true;
      btn.classList.remove('active');
    }
  }
</script>

</body>
</html>
