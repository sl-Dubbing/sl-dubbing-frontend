<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Glotix</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* نفس ستايل صفحة تسجيل الدخول */
    :root {
      --bg-page: #fafafa;
      --bg-card: #ffffff;
      --border-color: #e5e7eb;
      --border-focus: #0f0f10;
      --text-main: #0f0f10;
      --text-muted: #6b7280;
      --primary: #0f0f10;
      --primary-hover: #27272a;
      --accent-blue: #007aff;
      --error: #ef4444;
      --success: #10b981;
      --radius-md: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
    body { background-color: var(--bg-page); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .login-container { width: 100%; max-width: 420px; padding: 40px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); }
    .logo { display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.6rem; font-weight: 900; text-decoration: none; color: var(--text-main); margin-bottom: 30px; }
    .title { text-align: center; font-size: 1.5rem; font-weight: 800; margin-bottom: 24px; }
    .form-group { margin-bottom: 18px; }
    label { font-size: 0.9rem; font-weight: 600; color: var(--text-main); display: block; margin-bottom: 8px; }
    input { width: 100%; height: 48px; padding: 0 16px; background: var(--bg-page); border: 1px solid var(--border-color); border-radius: 12px; font-size: 1rem; }
    input:focus { border-color: var(--border-focus); background: var(--bg-card); box-shadow: 0 0 0 3px rgba(15,15,16,0.05); }
    .submit-btn { width: 100%; height: 48px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; }
    .submit-btn:hover { background: var(--primary-hover); }
    .footer-text { text-align: center; margin-top: 24px; font-size: 0.95rem; color: var(--text-muted); }
    .footer-text a { font-weight: 600; text-decoration: none; color: var(--text-main); }
    .footer-text a:hover { color: var(--accent-blue); }
    #toasts { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; align-items: center; }
    .toast { background: var(--primary); color: white; padding: 12px 24px; border-radius: var(--radius-md); font-weight: 500; font-size: 0.95rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
    .toast.error { background: var(--error); }
    .toast.success { background: var(--success); }
  </style>
</head>
<body>
<div class="login-container">
  <a class="logo" href="/">Glotix</a>
  <h1 class="title">Create your account</h1>
  <form id="signupForm">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" required autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" required minlength="6">
    </div>
    <button type="submit" class="submit-btn">Sign up</button>
  </form>
  <p class="footer-text">Already have an account? <a href="/login">Sign in</a></p>
</div>
<div id="toasts"></div>

<script src="js/config.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const supa = window.supabase.createClient(
    window.APP_CONFIG.SUPABASE_URL,
    window.APP_CONFIG.SUPABASE_KEY
  );

  const showToast = (msg, type='info') => {
    const container = document.getElementById('toasts');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerText = msg;
    container.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  };

  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const { data, error } = await supa.auth.signUp({ email, password });

    if (error) {
      console.error(error);
      showToast(error.message, 'error');
    } else {
      showToast('Account created! Check your email to confirm.', 'success');
      setTimeout(() => window.location.replace('/login'), 1500);
    }
  });
});
</script>
</body>
</html>
