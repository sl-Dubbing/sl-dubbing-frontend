<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sl-Dubbing | منصة الذكاء الاصطناعي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ── ElevenLabs Light Theme ── */
        :root {
            --bg-page: #fafafa;
            --bg-card: #ffffff;
            --border-color: #e5e7eb;
            --text-main: #0f0f10;
            --text-muted: #6b7280;
            --primary: #0f0f10;
            --primary-hover: #27272a;
            --accent-blue: #007aff;
            --accent-blue-soft: rgba(0,122,255,0.1);
            --success: #10b981;
            --error: #ef4444;
            --radius-md: 12px;
            --radius-lg: 24px;
            --sidebar-w: 280px;
            --transition: 0.32s cubic-bezier(0.32, 0.72, 0, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg-page); color: var(--text-main); min-height: 100vh; overflow-x: hidden; line-height: 1.5; }
        .page { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }

        /* ── Header ── */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 18px 0 40px; }
        
        /* 👈 تم تعديل الرابط هنا ليكون نظيفاً / */
        .logo { display: flex; align-items: center; gap: 12px; font-size: 1.25rem; font-weight: 800; text-decoration: none; color: var(--text-main); }
        
        .user-zone { display: flex; align-items: center; gap: 12px; }
        .menu-btn { background: var(--bg-card); border: 1px solid var(--border-color); padding: 8px 14px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 7px; font-weight: 600; font-size: .9rem; }

        /* ── Server Badge ── */
        .srv-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; background: #fee2e2; border: 1px solid #fca5a5; border-radius: 20px; font-size: .75rem; color: #ef4444; font-weight: 700; margin-bottom: 40px; cursor: pointer; }
        .srv-badge.on { background: #d1fae5; border-color: #6ee7b7; color: #10b981; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }

        /* ── Hero & Tools Grid ── */
        .hero { text-align: center; padding: 20px 0 60px; }
        .hero h1 { font-size: clamp(2.5rem, 5vw, 3.5rem); font-weight: 900; line-height: 1.1; margin-bottom: 16px; letter-spacing: -0.03em; }
        .tools-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; margin-bottom: 80px; }
        .tool-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 32px; cursor: pointer; transition: 0.3s; text-align: left; }
        .tool-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

        /* ── Sidebar ── */
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 200; opacity: 0; visibility: hidden; transition: var(--transition); backdrop-filter: blur(8px); }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }
        .sidebar { position: fixed; top: 0; right: -320px; width: var(--sidebar-w); height: 100vh; background: var(--bg-card); border-left: 1px solid var(--border-color); padding: 25px; z-index: 300; transition: right var(--transition); display: flex; flex-direction: column; gap: 20px; }
        .sidebar.active { right: 0; }
    </style>
</head>
<body>

<div class="page">
    <header class="top-bar">
        <a class="logo" href="/"><i class="fas fa-cube"></i> sl-Dubbing</a>
        <div class="user-zone">
            <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i> القائمة</button>
        </div>
    </header>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <h3 style="font-weight: 800; margin-bottom: 20px;">القائمة</h3>
        <a href="/dubbing" style="text-decoration:none; color:inherit; padding:10px; border-radius:8px;"><i class="fas fa-film"></i> استوديو الدبلجة</a>
        <a href="/tts" style="text-decoration:none; color:inherit; padding:10px; border-radius:8px;"><i class="fas fa-microphone"></i> تحويل النص لصوت</a>
    </aside>

    <div class="srv-badge" id="srv">
        <span class="dot"></span><span id="srvTxt">جاري فحص الاتصال...</span>
    </div>

    <section class="hero">
        <h1>أنشئ محتوى صوتي<br>احترافي بالذكاء الاصطناعي</h1>
    </section>

    <div class="tools-row">
        <div class="tool-card" onclick="location.href='/tts'">
            <span class="ico"><i class="fas fa-microphone-lines"></i></span>
            <h3>تحويل النص لصوت</h3>
            <p>حوّل أي نص إلى كلام طبيعي بـ 25 لغة.</p>
        </div>
        <div class="tool-card" onclick="location.href='/dubbing'">
            <span class="ico"><i class="fas fa-video"></i></span>
            <h3>دبلجة فيديو AI</h3>
            <p>دبلج فيديوهاتك تلقائياً مع استنساخ الصوت.</p>
        </div>
    </div>
</div>

<script>
    // 🔗 ربط السيرفر الرسمي
    const BE = 'https://api.glotix.ai';
    
    async function checkServer() {
        try {
            const r = await fetch(BE + '/api/status');
            const data = await r.json();
            const badge = document.getElementById('srv');
            const txt = document.getElementById('srvTxt');
            if (data.is_online) {
                badge.className = 'srv-badge on';
                txt.textContent = 'متصل بالسحاب';
            } else {
                badge.className = 'srv-badge';
                txt.textContent = 'النظام غير متصل';
            }
        } catch (e) { document.getElementById('srvTxt').textContent = 'خطأ في الاتصال'; }
    }

    // تفعيل القائمة الجانبية
    document.getElementById('menuBtn').onclick = () => {
        document.getElementById('sidebar').classList.add('active');
        document.getElementById('sidebarOverlay').classList.add('active');
    };
    document.getElementById('sidebarOverlay').onclick = () => {
        document.getElementById('sidebar').classList.remove('active');
        document.getElementById('sidebarOverlay').classList.remove('active');
    };

    checkServer();
    setInterval(checkServer, 30000);
</script>
</body>
</html>
