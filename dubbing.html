<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>sl-Dubbing | Pro Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- 🌟 ملف التنسيقات الرئيسي (يحتوي على تنسيقات الشريط الجانبي والعلوي الأصلية) -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- مكتبة الموجات الصوتية -->
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>

    <style>
        /* 🎨 التنسيقات المخصصة لصفحة الدبلجة فقط (نمط السينما وأدوات التحكم) */
        :root {
            --accent-green: #10b981;
            --border-color: #e5e7eb;
        }

        /* --- منطقة العمل الرئيسية --- */
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        
        .upload-box {
            border: 2px dashed var(--border-color); border-radius: 20px;
            padding: 50px; text-align: center; cursor: pointer; transition: 0.3s;
            background: #fff; margin-bottom: 25px;
        }
        .upload-box:hover { border-color: #3b82f6; background: #f9fafb; }
        
        #previewArea { display: none; width: 100%; margin-bottom: 25px; border-radius: 15px; overflow: hidden; background: #000; }
        #videoPreview { width: 100%; display: block; max-height: 450px; }
        #audioPreviewLabel { display: none; padding: 40px; text-align: center; background: #f1f5f9; color: #334155; }

        /* --- أزرار التحكم (Switches & Dropdowns) --- */
        .controls-grid { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 20px; align-items: flex-start; }
        
        .switch-container {
            display: flex; align-items: center; justify-content: space-between;
            background: #fff; border: 1px solid var(--border-color);
            padding: 10px 15px; border-radius: 12px; min-width: 170px; margin-bottom: 8px;
        }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; 
            background-color: #e5e7eb; transition: .4s; border-radius: 34px; 
        }
        .slider:before { 
            position: absolute; content: ""; height: 16px; width: 16px; 
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; 
        }
        input:checked + .slider { background-color: var(--accent-green); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* القائمة المنسدلة للغات (بيضاء بنص أسود) */
        .drop-btn {
            background: #fff; border: 1px solid var(--border-color);
            padding: 12px 25px; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; gap: 10px; font-weight: 600; position: relative;
        }
        .drop-content {
            position: absolute; top: 115%; left: 0; width: 280px;
            background: #ffffff !important; border: 1px solid var(--border-color);
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none; z-index: 100; padding: 10px;
        }
        .drop-btn.active .drop-content { display: block; }
        
        /* تنسيق اللغات داخل القائمة المنسدلة */
        .lang-item-ui { color: #000 !important; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .lang-item-ui:hover { background: #f3f4f6 !important; }

        .start-btn {
            width: 100%; background: #3b82f6; color: #fff; border: none;
            padding: 20px; border-radius: 15px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; margin-top: 15px; box-shadow: 0 4px 15px rgba(59,130,246,0.2);
        }

        /* --- نمط السينما (النتائج السفلية) --- */
        .cinema-results {
            display: flex; gap: 15px; flex-direction: row-reverse;
            background: #000; padding: 20px; border-radius: 20px; margin-top: 40px;
        }
        .cinema-player { flex: 3; position: relative; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; }
        
        .dl-corner { position: absolute; top: 15px; right: 15px; z-index: 100; display: none; }
        .dl-icon-btn { background: rgba(255,255,255,0.9); color: #000; width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.2rem; }

        .cinema-sidebar { flex: 1; background: #111; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .side-lang-card { padding: 12px; border-radius: 8px; background: #1a1a1a; color: #888; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s;}
        .side-lang-card.active { background: #fff; color: #000; font-weight: bold; }
    </style>
</head>
<body data-mode="fast">

<!-- 🌟 الهيكل الأصلي للشريط العلوي والجانبي (مأخوذ من stt.html) 🌟 -->
<header class="top-bar">
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="menu-btn" id="menuBtn" type="button" onclick="openSidebar()"><i class="fas fa-bars"></i><span>القائمة</span></button>
    <div class="top-logo"><h2>sl-Dubbing</h2></div>
  </div>
  <span class="account-badge" id="topAccountBadge"><i class="fas fa-coins" style="color:#f59e0b; margin-left: 5px;"></i> <span id="userPoints">18100 نقطة</span></span>
</header>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-user-section" id="authSection" style="position: relative;">
    <!-- ✖️ زر الإغلاق الجديد للشريط الجانبي -->
    <button onclick="closeSidebar()" style="position: absolute; top: 15px; left: 15px; background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #9aa1ac; transition: 0.2s;" onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='#9aa1ac'">
        <i class="fas fa-times"></i>
    </button>
    <div style="color:#9aa1ac;font-size:0.9rem;text-align:center; padding-top: 20px;">جاري التحقق...</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">القائمة الرئيسية</div>
    <ul>
      <li><a href="dubbing.html" class="active"><i class="fas fa-film"></i> استوديو الدبلجة</a></li>
      <li><a href="history.html"><i class="fas fa-folder-open"></i> ملفاتي (المجلدات)</a></li>
      <li><a href="tts.html"><i class="fas fa-microphone"></i> تحويل النص لصوت</a></li>
      <li><a href="stt.html"><i class="fas fa-file-alt"></i> تحويل الصوت لنص</a></li>
    </ul>
  </nav>
</aside>

<!-- منطقة العمل الأساسية -->
<main class="main-content">
    <div class="container">
        
        <!-- منطقة الرفع والمعاينة -->
        <div id="previewArea">
            <video id="videoPreview" controls></video>
            <div id="audioPreviewLabel">
                <i class="fas fa-music fa-3x"></i>
                <h4 id="audioFileName"></h4>
            </div>
        </div>
        
        <div class="upload-box" id="dropZone" onclick="document.getElementById('mediaFile').click()">
            <input type="file" id="mediaFile" style="display:none;" accept="video/*,audio/*">
            <i class="fas fa-cloud-upload-alt" style="font-size:3rem; color:#3b82f6; margin-bottom:15px;"></i>
            <div style="font-weight:bold; font-size:1.2rem;">اسحب الملف هنا أو اضغط للاختيار</div>
            <p style="color:#94a3b8; font-size:0.9rem;">MP4, MOV, MP3, WAV (Up to 500MB)</p>
        </div>

        <!-- أدوات التحكم -->
        <div class="controls-grid">
            <!-- القائمة المنسدلة للغات -->
            <div class="drop-btn" id="langTrigger" onclick="this.classList.toggle('active')">
                <i class="fas fa-globe"></i> اختر اللغات
                <div class="drop-content" onclick="event.stopPropagation()">
                    <!-- اللغات ستتولد هنا عبر الجافاسكريبت -->
                    <div id="langList" style="max-height: 250px; overflow-y: auto;"></div>
                </div>
            </div>

            <!-- أزرار التفعيل (Switches) -->
            <div style="display:flex; flex-direction:column; gap:5px;">
                <div class="switch-container">
                    <span>إخراج فيديو</span>
                    <label class="switch">
                        <input type="checkbox" id="videoToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="switch-container">
                    <span>مزامنة شفاه</span>
                    <label class="switch">
                        <input type="checkbox" id="lipsyncToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <button id="dubBtn" class="start-btn" style="display:none;">بدء الدبلجة الآن</button>

        <!-- منطقة النتائج (السينما) -->
        <div id="resultsCard" style="display:none;">
            <div class="cinema-results">
                <aside class="cinema-sidebar" id="cinemaLangs"></aside>
                <div class="cinema-player">
                    <div id="dlArea" class="dl-corner">
                        <a id="masterDl" href="#" target="_blank" class="dl-icon-btn" title="تحميل">
                            <i class="fas fa-download"></i>
                        </a>
                    </div>
                    <div id="mainPlayer" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
                        <i class="fas fa-spinner fa-spin fa-2x" style="color:#444;"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- استدعاء ملفات الجافاسكريبت الأساسية -->
<script src="js/config.js"></script>
<script src="js/shared.js"></script>
<script src="js/languages-data.js"></script>
<script src="js/dubbing.js"></script> <!-- تأكد أن هذا الملف يحتوي على الكود في الأسفل -->
</body>
</html>
