<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dubbing Studio | sl-Dubbing</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <button class="main-toggle-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <span class="menu-title">القائمة</span>
        </div>
        
        <div class="logo-area">
            <h2>|| sl-Dubbing</h2>
        </div>

        <div id="authSection">
            <div style="color: #666; font-size: 0.8rem; text-align: center;">جاري التحقق...</div>
        </div>

        <nav>
            <ul>
                <li><a href="index.html"><i class="fas fa-th-large"></i> الرئيسية</a></li>
                <li><a href="dubbing.html" class="active"><i class="fas fa-film"></i> استوديو الدبلجة</a></li>
                <li><a href="tts.html"><i class="fas fa-comment-dots"></i> تحويل النص لصوت</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content" id="mainContent">
        <header>
            <h1>استوديو الدبلجة الاحترافي</h1>
            <p>قم برفع الفيديو واختيار لغة الهدف للبدء</p>
        </header>

        <div class="workspace">
            <div class="main-area">
                <section class="card">
                    <h3><i class="fas fa-cloud-upload-alt"></i> 1. رفع الوسائط</h3>
                    <div class="upload-box">
                        <input type="file" id="mediaFile" accept="video/*,audio/*" style="display: none;" onchange="updateFileName()">
                        <button onclick="document.getElementById('mediaFile').click()" class="btn-secondary">
                            <i class="fas fa-file-video"></i> اختر ملف
                        </button>
                        <div id="fileTxt">لم يتم اختيار ملف</div>
                    </div>
                </section>

                <section class="card">
                    <h3><i class="fas fa-language"></i> 2. لغة الهدف</h3>
                    <select id="langSelect" class="lang-dropdown" onchange="setLang(this.value)">
                        <option value="" disabled selected>اختر لغة الهدف...</option>
                    </select>
                </section>

                <section class="card">
                    <h3><i class="fas fa-microphone-alt"></i> 3. استنساخ الصوت</h3>
                    <div class="custom-voice-area">
                        <input type="file" id="customVoice" onchange="handleCustomVoice(this)" style="display: none;">
                        <button onclick="document.getElementById('customVoice').click()" class="btn-sm">
                            <i class="fas fa-plus"></i> رفع عينة صوت
                        </button>
                        <span id="customVoiceTxt"></span>
                    </div>
                </section>

                <button id="dubBtn" onclick="startDubbing()" class="btn-primary">
                    <i class="fas fa-wand-magic-sparkles"></i> بدء الدبلجة الآن
                </button>
            </div>

            <div class="side-options">
                <section class="card" id="progressArea" style="display: none;">
                    <h3><i class="fas fa-spinner fa-spin"></i> جاري العمل...</h3>
                    <p id="statusTxt">الحالة: الانتظار</p>
                    <div class="progress-bar"><div id="progFill" class="prog-fill"></div></div>
                </section>

                <section class="card" id="resCard" style="display: none;">
                    <h3><i class="fas fa-check-double"></i> النتيجة</h3>
                    <audio id="dubAud" controls style="width:100%"></audio>
                    <video id="dubVid" controls style="width:100%; display:none;"></video>
                    <a id="dlBtn" href="#" download class="btn-primary" style="margin-top:10px; background:#065f2c; text-align:center; text-decoration:none;">تحميل</a>
                </section>
            </div>
        </div>
    </main>

    <div id="toasts"></div>
    <script src="js/shared.js"></script>
    <script src="js/dubbing.js"></script>
</body>
</html>
