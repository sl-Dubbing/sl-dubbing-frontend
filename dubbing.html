<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Dubbing Studio | sl-Dubbing</title>

    <style>
    :root {
        --bg-dark: #0b1020;         
        --sidebar-bg: #0f1724;      
        --card-bg: rgba(255,255,255,0.04);
        --border: rgba(167,139,250,0.12);
        --accent: #7c3aed;          
        --accent-2: #2563eb;        
        --gold: #ffb800;            
        --text: #e6e7ff;            
        --muted: #9ca3af;      
        --progress: #34d399; 
        --sidebar-w: 280px;         
        --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    </style>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>

    <div class="overlay-for-sidebar" id="sidebarOverlay"></div>

    <header class="top-nav">
        <button class="menu-trigger" id="menuToggle">
            <i class="fas fa-bars"></i>
            <span>القائمة</span>
        </button>
    </header>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <div class="logo-area">
                <h2>|| sl-Dubbing</h2>
            </div>
            
            <div id="authSection" class="user-auth-card">
                <div class="loading-dots">جاري التحميل...</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-label">التنقل السريع</div>
            <ul>
                <li>
                    <a href="index.html">
                        <i class="fas fa-home"></i> 
                        <span>الرئيسية</span>
                    </a>
                </li>
                <li>
                    <a href="dubbing.html" class="active">
                        <i class="fas fa-film"></i> 
                        <span>استوديو الدبلجة</span>
                    </a>
                </li>
                <li>
                    <a href="tts.html">
                        <i class="fas fa-comment-dots"></i> 
                        <span>تحويل النص لصوت</span>
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <main class="main-content" id="mainContent">
        <div class="content-wrapper">
            <header class="page-header">
                <h1>استوديو الدبلجة الاحترافي</h1>
                <p>حول فيديوهاتك للغة التي تحب بضغطة زر</p>
            </header>

            <div class="workspace-grid">
                <div class="main-tools">
                    <section class="tool-card">
                        <div class="card-head">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <h3>1. رفع الوسائط</h3>
                        </div>
                        <div class="upload-zone">
                            <input type="file" id="mediaFile" hidden onchange="updateFileName()" />
                            <button onclick="document.getElementById('mediaFile').click()" class="btn-upload">
                                <i class="fas fa-file-video"></i> اختر فيديو أو صوت
                            </button>
                            <p id="fileTxt" class="file-name">لم يتم اختيار ملف بعد</p>
                        </div>
                    </section>

                    <section class="tool-card">
                        <div class="card-head">
                            <i class="fas fa-language"></i>
                            <h3>2. لغة الهدف</h3>
                        </div>
                        <select id="langSelect" class="custom-select">
                            <option value="ar">🇸🇦 العربية</option>
                            <option value="en">🇺🇸 الإنجليزية</option>
                        </select>
                    </section>

                    <button id="dubBtn" class="btn-execute">
                        <i class="fas fa-wand-magic-sparkles"></i> بدء الدبلجة الآن
                    </button>
                </div>

                <div class="status-panel">
                    <section class="tool-card" id="progressArea" style="display:none;">
                        <h3><i class="fas fa-sync fa-spin"></i> المعالجة</h3>
                        <p id="statusTxt">الحالة: في الانتظار</p>
                        <div class="bar-bg"><div id="progFill" class="bar-fill"></div></div>
                    </section>

                    <section class="tool-card" id="resCard" style="display:none;">
                        <h3 class="success-text"><i class="fas fa-check-circle"></i> جاهز</h3>
                        <audio id="dubAud" controls style="width:100%"></audio>
                        <a id="dlBtn" href="#" download class="btn-dl">تحميل النتيجة</a>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <div id="toasts"></div>
    <script src="js/dubbing.js" defer></script>
</body>
</html>
