<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>sl-Dubbing | Cinema Studio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>

  <style>
    /* 🎨 الهوية البصرية: أبيض، أسود، رمادي */
    :root {
      --primary-white: #ffffff;
      --secondary-gray: #f9fafb;
      --border-gray: #e5e7eb;
      --dark-sidebar: #111111;
      --active-white: #ffffff;
    }

    body { background: #fdfdfd; font-family: system-ui, sans-serif; }

    /* إصلاح القائمة المنسدلة (الصورة image_ca819a.png) */
    .icon-btn { position: relative; background: #fff; border: 1px solid var(--border-gray); padding: 12px; border-radius: 10px; cursor: pointer; }
    
    .dropdown-box { 
      position: absolute; top: 110%; left: 0; width: 280px; 
      background: var(--primary-white) !important; 
      border: 1px solid var(--border-gray); 
      box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
      display: none; z-index: 1000; padding: 15px; border-radius: 12px;
    }
    .icon-btn.active .dropdown-box { display: block; }
    
    /* نصوص اللغات داخل القائمة */
    #langList div, .styled-select { 
      color: #000000 !important; 
      background: #ffffff !important; 
      padding: 10px; border-radius: 6px; cursor: pointer; 
    }
    #langList div:hover { background: var(--secondary-gray) !important; }

    /* --- نمط السينما (Cinema Mode) --- */
    .cinema-container { 
      display: flex; gap: 15px; flex-direction: row-reverse; 
      background: #000; padding: 20px; border-radius: 20px; margin-top: 30px;
    }

    /* قائمة اللغات الجانبية */
    .lang-sidebar { 
      flex: 1; background: var(--dark-sidebar); border-radius: 12px; 
      padding: 10px; display: flex; flex-direction: column; gap: 8px; min-width: 220px;
    }
    .sidebar-header { color: #666; font-size: 0.8rem; padding: 5px 10px; border-bottom: 1px solid #222; }
    
    .lang-item { 
      padding: 12px; border-radius: 8px; background: #1a1a1a; 
      color: #999; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px;
    }
    .lang-item.active { background: var(--active-white); color: #000; font-weight: bold; }

    /* منطقة المشغل وزر التحميل في الزاوية */
    .player-main { flex: 3; position: relative; border-radius: 12px; overflow: hidden; background: #000; aspect-ratio: 16/9; }
    
    .download-corner { position: absolute; top: 15px; right: 15px; z-index: 20; display: none; }
    .icon-dl-btn { 
      background: rgba(255, 255, 255, 0.9); color: #000; 
      width: 45px; height: 45px; border-radius: 10px; 
      display: flex; align-items: center; justify-content: center; 
      text-decoration: none; font-size: 1.2rem; transition: 0.3s;
    }
    .icon-dl-btn:hover { background: #fff; transform: scale(1.1); }

    .start-btn { width: 100%; padding: 18px; background: #000; color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; }
  </style>
</head>
<body>

<main class="main-content">
  <div class="workspace-wrapper">
    <div class="dub-workspace">
      <!-- منطقة الرفع -->
      <section class="media-zone" onclick="document.getElementById('mediaFile').click()">
        <input type="file" id="mediaFile" accept="video/*,audio/*" style="display:none;">
        <div id="uploadPlaceholder">
          <i class="fas fa-cloud-upload-alt upload-icon"></i>
          <p>اسحب الملف أو اضغط للرفع</p>
        </div>
      </section>

      <!-- شريط الأدوات (أبيض وأسود) -->
      <div class="action-bar">
        <div class="icon-btn" id="langTrigger" onclick="toggleDrop('langTrigger')">
          <i class="fas fa-globe"></i> <span>اللغات</span>
          <div class="dropdown-box" onclick="event.stopPropagation()">
            <div id="langList"></div>
          </div>
        </div>
        
        <div class="options-group" style="display:flex; gap:10px;">
           <div class="icon-btn"><span>إخراج فيديو</span> <input type="checkbox" id="videoToggle" checked></div>
           <div class="icon-btn"><span>مزامنة شفاه</span> <input type="checkbox" id="lipsyncToggle"></div>
        </div>
      </div>

      <button id="dubBtn" class="start-btn" style="display:none;">بدء الدبلجة الآن</button>
    </div>

    <!-- كارت النتائج السينمائي -->
    <div id="resultsCard" style="display:none;">
      <div class="cinema-container">
        <aside class="lang-sidebar">
          <div class="sidebar-header">اللغات المكتملة</div>
          <div id="langSidebarList"></div>
        </aside>
        
        <div class="player-main">
          <!-- أيقونة التحميل في الزاوية -->
          <div id="downloadArea" class="download-corner">
            <a id="masterDownloadBtn" href="#" target="_blank" class="icon-dl-btn" title="تحميل">
              <i class="fas fa-download"></i>
            </a>
          </div>
          <div id="mainMediaWrapper" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
             <p style="color:#444;">بانتظار المعالجة...</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="js/dubbing.js"></script>
</body>
</html>
