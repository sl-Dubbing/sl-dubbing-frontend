<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Dubbing | Cloudinary Voices</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #f5f5f7; --card: #fff; --primary: #0f0f10; --mint: #a4fec4; --green-dk: #065f2c; --radius: 16px; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; color: #111827; }
        .wrap { max-width: 800px; margin: 0 auto; }
        .card { background: #fff; border: 1px solid #e5e7eb; border-radius: var(--radius); padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .ttl { font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }
        .spk-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .item-card { padding: 20px 10px; border-radius: 14px; border: 1px solid #e5e7eb; text-align: center; cursor: pointer; transition: 0.3s; background: #fff; }
        .item-card.active { background: var(--mint); border-color: var(--primary); font-weight: 700; }
        .btn { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 30px; cursor: pointer; width: 100%; font-size: 1.1rem; font-weight: 600; margin-top: 10px; }
        #progressArea { display: none; margin-top: 25px; text-align: center; }
        .prog-bar { height: 10px; background: #e5e7eb; border-radius: 50px; overflow: hidden; margin-top: 10px; }
        .prog-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.5s ease; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="card">
        <div class="ttl"><i class="fas fa-file-upload"></i> 1. Upload Video or Audio</div>
        <input type="file" id="mediaFile" accept="video/*,audio/*" style="width: 100%;">
    </div>

    <div class="card">
        <div class="ttl"><i class="fas fa-microphone-lines"></i> 2. Select Dubbing Voice (Auto-Sync)</div>
        <div class="spk-grid" id="spkGrid">
            <div class="item-card active" onclick="selectVoice('', this)">
                <i class="fas fa-microphone" style="display:block; margin-bottom:8px;"></i> Original Voice
            </div>
        </div>
    </div>

    <div class="card">
        <button class="btn" id="startBtn" onclick="startDubbing()">Start Dubbing Process</button>
        <div id="progressArea">
            <p id="statusTxt" style="font-weight: 600;">Processing media...</p>
            <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
        </div>
    </div>

    <div class="card" id="resCard" style="display:none; border: 2px solid var(--green-dk);">
        <div class="ttl" style="color:var(--green-dk)"><i class="fas fa-check-circle"></i> Result Ready!</div>
        <audio id="dubAud" controls style="width: 100%; margin: 15px 0;"></audio>
        <a id="dlBtn" download="dubbed.mp3" href="#" class="btn" style="text-decoration:none; display:block; text-align:center; background:var(--green-dk)">Download File</a>
    </div>
</div>

<script>
const API_BASE = 'https://web-production-14a1.up.railway.app';
let selectedVoiceUrl = '';

document.addEventListener('DOMContentLoaded', loadCloudinaryVoices);

async function loadCloudinaryVoices() {
    const grid = document.getElementById('spkGrid');
    try {
        const res = await fetch(`${API_BASE}/api/voices`);
        const data = await res.json();
        if (data.success) {
            data.voices.forEach(v => {
                const div = document.createElement('div');
                div.className = 'item-card';
                div.innerHTML = `<i class="fas fa-user" style="display:block; margin-bottom:8px;"></i> ${v.name}`;
                div.onclick = () => selectVoice(v.url, div);
                grid.appendChild(div);
            });
        }
    } catch (e) { console.error("Voices sync failed", e); }
}

function selectVoice(url, el) {
    selectedVoiceUrl = url;
    document.querySelectorAll('.item-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
}

async function startDubbing() {
    const file = document.getElementById('mediaFile').files[0];
    if (!file) return alert("Please select a file first");

    const btn = document.getElementById('startBtn');
    btn.disabled = true; btn.innerText = "Working...";
    document.getElementById('progressArea').style.display = 'block';
    document.getElementById('resCard').style.display = 'none';

    const fd = new FormData();
    fd.append('media_file', file);
    fd.append('voice_url', selectedVoiceUrl);
    fd.append('lang', 'ar');

    try {
        const res = await fetch(`${API_BASE}/api/dub`, { method: 'POST', body: fd, credentials: 'include' });
        const data = await res.json();
        if (data.job_id) poll(data.job_id);
        else throw new Error(data.error);
    } catch (e) { alert(e.message); btn.disabled = false; btn.innerText = "Start Dubbing"; }
}

async function poll(id) {
    const interval = setInterval(async () => {
        const res = await fetch(`${API_BASE}/api/job/${id}`, { credentials: 'include' });
        const data = await res.json();
        if (data.status === 'completed') {
            clearInterval(interval);
            document.getElementById('resCard').style.display = 'block';
            document.getElementById('dubAud').src = data.audio_url;
            document.getElementById('dlBtn').href = data.audio_url;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').innerText = "Start Dubbing Process";
            document.getElementById('progFill').style.width = '100%';
        } else if (data.status === 'failed') {
            clearInterval(interval);
            alert("Dubbing failed. Credits returned.");
            document.getElementById('startBtn').disabled = false;
        } else {
            document.getElementById('progFill').style.width = '50%';
        }
    }, 3000);
}
</script>
</body>
</html>
