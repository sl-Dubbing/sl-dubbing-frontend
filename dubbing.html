<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dubbing Studio</title>
    
    <link rel="stylesheet" href="./css/variables.css">
   <link rel="stylesheet" href="./css/layout.css">
   <link rel="stylesheet" href="./css/components.css">
    <link rel="stylesheet" href="./css/style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div id="authSection"></div>
    </header>

    <main class="container">
        <section class="card">
            <h3><i class="fas fa-upload"></i> 1. Upload Media</h3>
            <input type="file" id="mediaFile" accept="video/*,audio/*">
            <div id="fileTxt"></div>
        </section>

        <section class="card">
            <h3><i class="fas fa-microphone"></i> 2. AI Voice Profile</h3>
            <div id="spkGrid" class="grid-container">
                </div>
            <input type="file" id="customVoice" onchange="handleCustomVoice(this)" style="display:none">
            <button onclick="document.getElementById('customVoice').click()" class="btn-secondary">
                <i class="fas fa-plus"></i> Upload Custom Voice Clone
            </button>
        </section>

        <section class="card">
            <h3><i class="fas fa-language"></i> 3. Target Language</h3>
            <div id="langGrid" class="grid-container">
                <div class="item-card active" onclick="setLang('en', this)">US English</div>
                <div class="item-card" onclick="setLang('ar', this)">SA Arabic</div>
            </div>
        </section>

        <button id="dubBtn" onclick="startDubbing()" class="btn-primary">GENERATE DUBBED MEDIA</button>

        <div id="progressArea" style="display:none;">
            <p id="statusTxt">Status: Ready</p>
            <div class="progress-bar"><div id="progFill"></div></div>
        </div>

        <div id="resCard" class="card" style="display:none;">
            <h3>Result:</h3>
            <audio id="dubAud" controls></audio>
        </div>
    </main>

    <div id="toasts"></div>

    <script src="js/shared.js"></script>
    <script src="js/dubbing.js"></script>
</body>
</html>
