<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Dubbing Studio | sl-Dubbing</title>

    <style>
    :root {
        --bg-dark: #0b1020;         
        --sidebar-bg: #0f1724;      
        --card-bg: rgba(255,255,255,0.04);
        --border: rgba(167,139,250,0.12);
        --accent: #7c3aed;          
        --accent-2: #2563eb;        
        --gold: #ffb800;            
        --text: #e6e7ff;            
        --sidebar-w: 280px;         
        --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    </style>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>

    <button class="menu-trigger" id="menuToggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
        <span>القائمة</span>
    </button>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="logo-area">
                <h2>|| sl-Dubbing</h2>
            </div>
            
            <div id="authSection" class="user-card">
                <div style="color: #666; font-size: 0.8rem; text-align: center;">جاري التحميل...</div>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li><a href="index.html"><i class="fas fa-home"></i> الرئيسية</a></li>
                    <li><a href="dubbing.html" class="active"><i class="fas fa-film"></i> استوديو الدبلجة</a></li>
                    <li><a href="tts.html"><i class="fas fa-microphone"></i> تحويل النص لصوت</a></li>
                </ul>
            </nav>
        </div>
    </aside>

    <main class="main-content" id="mainContent">
        <header class="main-header">
            <h1>استوديو الدبلجة الاحترافي</h1>
            <p>حول فيديوهاتك للغة التي تحب بضغطة زر</p>
        </header>

        <div class="workspace-grid">
            <div class="main-tools">
                <section class="card">
                    <h3><i class="fas fa-upload"></i> 1. رفع الوسائط</h3>
                    <div class="upload-zone">
                        <input type="file" id="mediaFile" hidden onchange="updateFileName()" />
                        <button onclick="document.getElementById('mediaFile').click()" class="btn-secondary">
                            <i class="fas fa-file-video"></i> اختر فيديو أو صوت
                        </button>
                        <p id="fileTxt">لم يتم اختيار ملف بعد</p>
                    </div>
                </section>

                <section class="card">
                    <h3><i class="fas fa-language"></i> 2. لغة الهدف</h3>
                    <select id="langSelect" class="styled-select">
                        <option value="ar">🇸🇦 العربية</option>
                        <option value="en">🇺🇸 الإنجليزية</option>
                    </select>
                </section>

                <button id="dubBtn" class="btn-execute">
                    <i class="fas fa-wand-magic-sparkles"></i> بدء الدبلجة الآن
                </button>
            </div>
        </div>
    </main>

    <div id="toasts"></div>

    <script src="js/dubbing.js"></script>
</body>
</html>
