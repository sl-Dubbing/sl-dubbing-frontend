<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>sl-Dubbing | Pro Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>

    <style>
        :root {
            --primary-bg: #ffffff;
            --sidebar-bg: #f8fafc; /* لون مختلف للشريط الجانبي */
            --accent-green: #10b981;
            --border-color: #e5e7eb;
        }

        body { margin: 0; font-family: system-ui, sans-serif; background: var(--primary-bg); overflow-x: hidden; }

        /* --- الشريط العلوي --- */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 25px; border-bottom: 1px solid var(--border-color);
            background: #fff; position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-weight: 800; color: #3b82f6; font-size: 1.5rem; }
        .points-badge { background: #f3f4f6; padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }

        /* --- الشريط الجانبي (مخفي افتراضياً) --- */
        .sidebar {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: var(--sidebar-bg); border-left: 1px solid var(--border-color);
            transition: 0.3s ease; z-index: 2000; padding: 30px 20px;
        }
        .sidebar.active { right: 0; box-shadow: -10px 0 30px rgba(0,0,0,0.05); }
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.2); display: none; z-index: 1500; 
        }
        .overlay.active { display: block; }

        /* --- منطقة العمل --- */
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        
        .upload-box {
            border: 2px dashed var(--border-color); border-radius: 20px;
            padding: 50px; text-align: center; cursor: pointer; transition: 0.3s;
            background: #fff; margin-bottom: 25px;
        }
        .upload-box:hover { border-color: #000; background: #f9fafb; }
        
        /* معاينة الفيديو */
        #previewArea { display: none; width: 100%; margin-bottom: 20px; border-radius: 15px; overflow: hidden; background: #000; }
        #videoPreview { width: 100%; display: block; max-height: 450px; }

        /* --- أزرار التحكم (Toggle & Dropdowns) --- */
        .controls-grid { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 20px; align-items: flex-start; }
        
        /* زر التفعيل (Switch) */
        .switch-container {
            display: flex; align-items: center; justify-content: space-between;
            background: #fff; border: 1px solid var(--border-color);
            padding: 10px 15px; border-radius: 12px; min-width: 160px; margin-bottom: 8px;
        }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; 
            background-color: #e5e7eb; transition: .4s; border-radius: 34px; 
        }
        .slider:before { 
            position: absolute; content: ""; height: 16px; width: 16px; 
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; 
        }
        input:checked + .slider { background-color: var(--accent-green); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* القائمة المنسدلة للغات (بيضاء تماماً) */
        .drop-btn {
            background: #fff; border: 1px solid var(--border-color);
            padding: 12px 25px; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; gap: 10px; font-weight: 600; position: relative;
        }
        .drop-content {
            position: absolute; top: 115%; left: 0; width: 280px;
            background: #ffffff !important; border: 1px solid var(--border-color);
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none; z-index: 100; padding: 10px;
        }
        .drop-btn.active .drop-content { display: block; }
        .lang-item-ui { color: #000 !important; padding: 10px; border-radius: 8px; cursor: pointer; }
        .lang-item-ui:hover { background: #f3f4f6 !important; }

        .start-btn {
            width: 100%; background: #3b82f6; color: #fff; border: none;
            padding: 20px; border-radius: 15px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; margin-top: 15px; box-shadow: 0 4px 15px rgba(59,130,246,0.2);
        }

        /* --- نمط السينما (النتائج) --- */
        .cinema-results {
            display: flex; gap: 15px; flex-direction: row-reverse;
            background: #000; padding: 20px; border-radius: 20px; margin-top: 40px;
        }
        .cinema-player { flex: 3; position: relative; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; }
        .dl-corner { position: absolute; top: 15px; right: 15px; z-index: 100; display: none; }
        .dl-btn-icon { background: #fff; color: #000; width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.2rem; }

        .cinema-sidebar { flex: 1; background: #111; border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .cinema-lang-card { padding: 12px; border-radius: 8px; background: #1a1a1a; color: #888; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .cinema-lang-card.active { background: #fff; color: #000; font-weight: bold; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- الشريط العلوي -->
<header class="top-bar">
    <div style="display:flex; align-items:center; gap:15px;">
        <button onclick="toggleSidebar()" style="background:none; border:none; font-size:1.1rem; cursor:pointer; font-weight:bold;">
            <i class="fas fa-bars"></i> القائمة
        </button>
        <div class="logo">sl-Dubbing</div>
    </div>
    <div class="points-badge">
        <i class="fas fa-coins" style="color:#f59e0b;"></i> 18100 نقطة
    </div>
</header>

<!-- الشريط الجانبي -->
<aside class="sidebar" id="sidebar">
    <h3 style="color:#64748b; font-size:0.8rem; margin-bottom:20px;">لوحة التحكم</h3>
    <nav style="display:flex; flex-direction:column; gap:15px;">
        <a href="#" style="text-decoration:none; color:#000; font-weight:bold;"><i class="fas fa-film"></i> استوديو الدبلجة</a>
        <a href="#" style="text-decoration:none; color:#64748b;"><i class="fas fa-folder"></i> ملفاتي</a>
        <a href="#" style="text-decoration:none; color:#64748b;"><i class="fas fa-microphone"></i> تحويل النص لصوت</a>
    </nav>
</aside>

<div class="container">
    <!-- منطقة الرفع والمعاينة -->
    <div id="previewArea">
        <video id="videoPreview" controls></video>
    </div>
    <div class="upload-box" id="dropZone" onclick="document.getElementById('mediaFile').click()">
        <input type="file" id="mediaFile" style="display:none;" accept="video/*,audio/*">
        <i class="fas fa-cloud-upload-alt" style="font-size:3rem; color:#3b82f6; margin-bottom:15px;"></i>
        <div style="font-weight:bold; font-size:1.2rem;">اسحب الملف هنا أو اضغط للاختيار</div>
    </div>

    <!-- أدوات التحكم -->
    <div class="controls-grid">
        <div class="drop-btn" id="langTrigger" onclick="this.classList.toggle('active')">
            <i class="fas fa-globe"></i> اختر اللغات
            <div class="drop-content" onclick="event.stopPropagation()">
                <div id="langList">
                    <!-- اللغات تظهر هنا -->
                </div>
            </div>
        </div>

        <div style="display:flex; flex-direction:column; gap:5px;">
            <div class="switch-container">
                <span>إخراج فيديو</span>
                <label class="switch"><input type="checkbox" id="videoToggle" checked><span class="slider"></span></label>
            </div>
            <div class="switch-container">
                <span>مزامنة شفاه</span>
                <label class="switch"><input type="checkbox" id="lipsyncToggle"><span class="slider"></span></label>
            </div>
        </div>
    </div>

    <button id="dubBtn" class="start-btn" style="display:none;">بدء الدبلجة الآن</button>

    <!-- النتائج -->
    <div id="resultsCard" style="display:none;">
        <div class="cinema-results">
            <aside class="cinema-sidebar" id="cinemaLangs"></aside>
            <div class="cinema-player">
                <div id="dlArea" class="dl-corner"><a id="masterDl" href="#" class="dl-btn-icon"><i class="fas fa-download"></i></a></div>
                <div id="mainPlayer" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
                    <i class="fas fa-spinner fa-spin fa-2x" style="color:#333;"></i>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/dubbing.js"></script>
</body>
</html>
