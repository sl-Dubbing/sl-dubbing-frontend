<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sl-Dubbing</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--bg:#f5f5f7;--card:#fff;--border:#e5e7eb;--text:#111827;--muted:#6b7280;--primary:#0f0f10;--mint:#a4fec4;--green-dk:#065f2c;--radius:14px;--shadow:0 1px 3px rgba(0,0,0,.07)}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh;text-align:right;line-height:1.6}
.topbar{background:var(--primary);padding:13px 28px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.15rem;font-weight:800;color:#fff;letter-spacing:-.02em}.logo span{color:var(--mint)}
.pill{display:flex;align-items:center;gap:6px;font-size:.75rem;color:#fff;border:1px solid rgba(255,255,255,.2);padding:4px 12px;border-radius:20px}
.dot{width:7px;height:7px;border-radius:50%;background:#6b7280;transition:background .4s}
.dot.on{background:var(--mint);box-shadow:0 0 6px var(--mint)}
.wrap{max-width:900px;margin:0 auto;padding:32px 18px 60px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:26px 28px;margin-bottom:18px;box-shadow:var(--shadow)}
.ttl{font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:9px;margin-bottom:20px}
.ttl i{color:var(--muted);font-size:.9rem}
.badge{font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--mint);color:var(--green-dk);text-transform:uppercase;letter-spacing:.04em}
.grp{margin-bottom:18px}.lbl{display:block;font-size:.85rem;font-weight:500;margin-bottom:6px}
input[type=text],select,textarea{width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:10px;font-size:.9rem;outline:none;background:#fff;color:var(--text);transition:border-color .18s}
input:focus,select:focus,textarea:focus{border-color:var(--primary)}
input[type=file].fi{width:100%;padding:10px 14px;background:#f9fafb;border:1px dashed #d1d5db;border-radius:10px;cursor:pointer;font-size:.85rem;color:var(--muted)}
.sep{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.78rem;margin:14px 0}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:var(--border)}
.srt-zone{border:1.5px dashed var(--border);border-radius:10px;padding:20px;background:#fafafa;text-align:center;cursor:pointer;transition:all .18s;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.srt-zone:hover{border-color:#9ca3af;background:#f3f4f6}
.srt-zone.ok{border-color:#059669;background:#f0fdf4;cursor:default}
.srt-zone.err{border-color:#ef4444;background:#fef2f2;cursor:pointer}
.srt-zone i{font-size:1.4rem;color:var(--muted)}
.srt-zone.ok i{color:#059669}.srt-zone.err i{color:#ef4444}
.srt-lbl{font-size:.875rem;color:var(--muted)}
.srt-zone.ok .srt-lbl{color:#059669;font-weight:600}.srt-zone.err .srt-lbl{color:#ef4444}
.srt-stats{margin-top:10px;display:flex;gap:10px;flex-wrap:wrap}
.stat{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:6px 12px;font-size:.8rem;color:#065f2c;font-weight:500}
.src-row{display:flex;align-items:center;gap:10px;margin-top:16px}
.src-row label{font-size:.85rem;font-weight:500;white-space:nowrap}.src-row select{flex:1}
.spk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:6px}
.spk-card{border:1.5px solid var(--border);border-radius:10px;padding:13px 10px;cursor:pointer;background:#fff;text-align:center;transition:all .18s;position:relative}
.spk-card:hover{border-color:#9ca3af}
.spk-card.active{border-color:var(--primary);background:var(--mint);box-shadow:0 0 0 2px var(--primary)}
.spk-av{width:40px;height:40px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;margin:0 auto 7px}
.spk-card.active .spk-av{background:var(--green-dk)}
.spk-nm{font-size:.85rem;font-weight:600}.spk-sub{font-size:.7rem;color:var(--muted);margin-top:2px}
.chk{position:absolute;top:5px;right:7px;color:var(--green-dk);font-size:.8rem;display:none}
.spk-card.active .chk{display:block}
.def-badge{position:absolute;top:5px;left:6px;font-size:.58rem;font-weight:700;padding:2px 5px;border-radius:8px;background:#f0fdf4;color:#059669;border:1px solid #bbf7d0}
.add-card{border-style:dashed;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;min-height:88px;color:var(--muted)}
.add-card:hover{color:var(--text)}.add-card i{font-size:1.3rem}.add-card span{font-size:.78rem}
.lang-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:9px;margin:12px 0 20px}
.lang-box{padding:10px 7px;background:#fff;border-radius:10px;text-align:center;cursor:pointer;border:1px solid var(--border);font-size:.85rem;user-select:none;transition:all .18s}
.lang-box:hover{border-color:#9ca3af}
.lang-box.active{border-color:var(--primary);background:var(--mint);font-weight:700;box-shadow:0 0 0 1.5px var(--primary)}
.btn-go{background:var(--primary);color:#fff;border:none;padding:14px;border-radius:10px;width:100%;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:all .2s;margin-top:6px}
.btn-go:hover{background:#27272a;transform:translateY(-1px)}
.btn2{background:#fff;border:1px solid #d1d5db;color:var(--text);padding:7px 13px;border-radius:8px;font-size:.83rem;font-weight:600;cursor:pointer;transition:background .15s}
.btn2:hover{background:#f3f4f6}
#progressArea{display:none;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.loader{display:none;justify-content:center;margin-bottom:14px;gap:1px}
.ll{font-size:.95rem;font-weight:700;letter-spacing:2px;color:var(--text);animation:wave 1.5s infinite;text-transform:uppercase}
@keyframes wave{0%,40%,100%{transform:translateY(0);opacity:.3}20%{transform:translateY(-4px);opacity:1}}
.prog-meta{display:flex;justify-content:space-between;font-size:.83rem;color:var(--muted);margin-bottom:6px}
.prog-bar-wrap{background:#e5e7eb;border-radius:8px;height:7px;overflow:hidden}
.prog-bar{background:var(--primary);width:0%;height:100%;border-radius:8px;transition:width .4s}
.eta{font-size:.78rem;color:var(--muted);margin-top:5px;text-align:center}
.res-card{display:none}
.res-item{background:#f9fafb;border:1px solid var(--border);padding:16px 18px;border-radius:10px;margin-top:12px}
.res-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.res-lang{font-weight:600;font-size:.9rem}
audio{width:100%;margin-top:4px}
#upProg{font-size:.8rem;color:#059669;margin-top:6px;display:none}
#ytInfo{display:none;background:#f9fafb;border:1px solid var(--border);border-radius:10px;padding:13px 16px;align-items:center;gap:16px;margin-bottom:16px}
#ytThumb{width:120px;border-radius:6px;flex-shrink:0}
#ytTitle{font-weight:600;font-size:.9rem;margin-bottom:3px}
#ytCh{font-size:.8rem;color:var(--muted)}
@media(max-width:580px){.card{padding:18px}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">sl<span>-Dubbing</span></div>
  <div class="pill"><div class="dot" id="dot"></div><span id="dotLbl">جاري التحميل...</span></div>
</div>
<div class="wrap">
  <div class="card">
    <div class="ttl"><i class="fas fa-photo-film"></i> المصدر</div>
    <div class="grp">
      <label class="lbl">رابط يوتيوب</label>
      <input type="text" id="ytUrl" placeholder="https://youtube.com/watch?v=..." oninput="onUrl(this.value)">
    </div>
    <div id="ytInfo">
      <img id="ytThumb" src="" alt="">
      <div><div id="ytTitle"></div><div id="ytCh"></div></div>
    </div>
    <div class="sep">أو</div>
    <div class="grp" style="margin-bottom:0">
      <label class="lbl">ملف صوتي أو فيديو</label>
      <input type="file" id="mediaFile" accept="audio/*,video/*" class="fi">
    </div>
  </div>
  <div class="card">
    <div class="ttl"><i class="fas fa-file-lines"></i> ملف الترجمة SRT <span class="badge">إلزامي</span></div>
    <input type="file" id="srtFile" accept=".srt,.vtt,.sbv,.txt,.ass,.ssa" style="display:none">
    <div class="srt-zone" id="srtZone" onclick="document.getElementById('srtFile').click()">
      <i class="fas fa-upload"></i>
      <div class="srt-lbl">انقر لرفع ملف SRT</div>
      <div style="font-size:.75rem;color:var(--muted)">يدعم: SRT, VTT, SBV, ASS, SSA</div>
    </div>
    <div class="srt-stats" id="srtStats" style="display:none"></div>
    <div class="src-row">
      <label>لغة المصدر</label>
      <select id="srcLang">
        <option value="auto">تلقائي</option>
        <option value="ar">العربية</option>
        <option value="en">الإنجليزية</option>
        <option value="fr">الفرنسية</option>
        <option value="de">الألمانية</option>
        <option value="es">الإسبانية</option>
        <option value="tr">التركية</option>
        <option value="ru">الروسية</option>
        <option value="it">الإيطالية</option>
        <option value="pt">البرتغالية</option>
        <option value="zh-cn">الصينية</option>
      </select>
    </div>
  </div>
  <div class="card">
    <div class="ttl"><i class="fas fa-microphone-lines"></i> صوت المتحدث</div>
    <p style="font-size:.83rem;color:var(--muted);margin-bottom:14px">اختر صوتاً أو ارفع عيّنة. يُستخدم في كل لغات الدبلجة.</p>
    <div class="spk-grid" id="spkGrid"></div>
    <input type="file" id="spkFile" accept="audio/*,video/*" style="display:none">
    <div id="upProg"><i class="fas fa-spinner fa-spin"></i> جاري رفع العيّنة...</div>
  </div>
  <div class="card">
    <div class="ttl"><i class="fas fa-language"></i> لغات الدبلجة</div>
    <div class="lang-grid" id="langGrid"></div>
    <button class="btn-go" id="startBtn" onclick="start()" style="opacity: 0.5; cursor: not-allowed;">
      <i class="fas fa-bolt" style="color:var(--mint)"></i>
      ابدأ الدبلجة
    </button>
    <div id="progressArea">
      <div class="loader" id="loader">
        <span class="ll" style="animation-delay:.0s">D</span>
        <span class="ll" style="animation-delay:.1s">u</span>
        <span class="ll" style="animation-delay:.2s">b</span>
        <span class="ll" style="animation-delay:.3s">b</span>
        <span class="ll" style="animation-delay:.4s">i</span>
        <span class="ll" style="animation-delay:.5s">n</span>
        <span class="ll" style="animation-delay:.6s">g</span>
      </div>
      <div class="prog-meta"><span id="statusTxt">جاري التحضير...</span><span id="pctTxt">0%</span></div>
      <div class="prog-bar-wrap"><div class="prog-bar" id="progBar"></div></div>
      <div class="eta" id="etaTxt"></div>
    </div>
  </div>
  <div class="card res-card" id="resCard">
    <div class="ttl"><i class="fas fa-circle-check"></i> النتائج</div>
    <div id="resList"></div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
