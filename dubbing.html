<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Dubbing | sl-Dubbing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg: #f5f5f7; --card: #fff; --primary: #0f0f10; --mint: #a4fec4; 
            --green-dk: #065f2c; --border: #e5e7eb; --radius: 16px; 
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #111827; margin: 0; padding-bottom: 50px; }
        
        .topbar { background: var(--primary); padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; color: #fff; height: 60px; }
        .logo-top { font-weight: 800; font-size: 1.1rem; text-decoration: none; color: white; }
        .auth-section { font-weight: 600; font-size: 0.85rem; }

        .brand-header { text-align: center; margin: 40px auto 15px; }
        .main-logo-img { max-width: 130px; margin-bottom: 10px; }
        .brand-name { font-size: 2.2rem; font-weight: 900; }
        .brand-name span { color: var(--green-dk); border-bottom: 4px solid var(--mint); }

        .wrap { max-width: 850px; margin: 0 auto; padding: 0 15px; }
        .card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .ttl { font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; font-size: 1rem; }

        .upload-area { border: 2px dashed var(--green-dk); border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; background: #f0fdf4; transition: 0.3s; }
        .upload-area:hover { background: #dcfce7; }
        
        .spk-grid, .lang-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .item-card { padding: 15px 10px; border-radius: 12px; border: 1px solid var(--border); text-align: center; cursor: pointer; transition: 0.3s; background: #fff; position: relative; }
        .item-card.active { background: var(--mint); border-color: var(--primary); font-weight: 700; }
        .item-card i { display: block; margin-bottom: 8px; font-size: 1.2rem; color: #666; }
        .item-card.active i { color: var(--primary); }

        .btn { background: var(--primary); color: white; width: 100%; height: 55px; border-radius: 30px; border: none; cursor: pointer; font-size: 1rem; font-weight: 600; transition: 0.3s; }
        .btn:disabled { background: #9ca3af; cursor: not-allowed; }

        #progressArea { display: none; margin-top: 20px; }
        .prog-bar-wrap { background: #eee; height: 10px; border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .prog-bar { height: 100%; width: 0%; background: var(--primary); transition: 0.5s; }

        .res-card { display: none; border: 2px solid var(--green-dk); text-align: center; }
    </style>
</head>
<body>

<div class="topbar">
    <a href="index.html" class="logo-top">sl<span style="color:var(--mint)">-Dubbing</span></a>
    <div class="auth-section" id="authSection">Checking...</div>
</div>

<div class="brand-header">
    <img src="logo/logo.gif" alt="Logo" class="main-logo-img">
    <h1 class="brand-name">sl-<span>Dubbing</span></h1>
</div>

<div class="wrap">
    <div class="card">
        <div class="ttl"><i class="fas fa-file-upload"></i> 1. Upload Video or Audio</div>
        <div class="upload-area" onclick="document.getElementById('mediaFile').click()">
            <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: var(--green-dk);"></i>
            <div id="fileTxt" style="margin-top:10px; font-weight: 500;">Click to select your media file</div>
        </div>
        <input type="file" id="mediaFile" hidden onchange="document.getElementById('fileTxt').innerText=this.files[0].name">
    </div>

    <div class="card">
        <div class="ttl"><i class="fas fa-microphone-alt"></i> 2. Select Dubbing Voice</div>
        <div class="spk-grid" id="spkGrid">
            <div class="item-card active" onclick="setVoice('', this)">
                <i class="fas fa-microphone"></i> Original Voice
            </div>
        </div>
    </div>

    <div class="card">
        <div class="ttl"><i class="fas fa-globe"></i> 3. Target Output Language</div>
        <div class="lang-grid" id="langGrid"></div>
    </div>

    <div class="card">
        <button class="btn" id="dubBtn" onclick="startDubbing()">Dub My Media Now</button>
        <div id="progressArea">
            <div style="display:flex; justify-content:space-between; font-size:0.85rem; font-weight:600;">
                <span id="statusTxt">AI is working...</span>
                <span id="pctTxt">0%</span>
            </div>
            <div class="prog-bar-wrap"><div class="prog-bar" id="progFill"></div></div>
        </div>
    </div>

    <div class="card res-card" id="resCard">
        <div class="ttl" style="color:var(--green-dk); justify-content:center;"><i class="fas fa-check-circle"></i> Processing Complete!</div>
        <audio id="dubAud" controls style="width:100%; margin: 15px 0;"></audio>
        <a id="dlBtn" download href="#" class="btn" style="text-decoration:none; display:flex; align-items:center; justify-content:center; background:var(--green-dk)">Download Dubbed File</a>
    </div>
</div>

<script>
const API_BASE = 'https://web-production-14a1.up.railway.app';
let selectedVoiceUrl = '';
let selectedLang = 'ar';

const LANGS = [
    {c:'en', n:'English', f:'🇺🇸'}, {c:'ar', n:'Arabic', f:'🇸🇦'}, {c:'es', n:'Spanish', f:'🇪🇸'},
    {c:'fr', n:'French', f:'🇫🇷'}, {c:'de', n:'German', f:'🇩🇪'}, {c:'it', n:'Italian', f:'🇮🇹'},
    {c:'ru', n:'Russian', f:'🇷🇺'}, {c:'ja', n:'Japanese', f:'🇯🇵'}
];

document.addEventListener('DOMContentLoaded', () => {
    checkAuth();
    renderLangs();
    loadVoices();
});

function renderLangs() {
    const g = document.getElementById('langGrid');
    g.innerHTML = LANGS.map(l => `
        <div class="item-card ${l.c===selectedLang?'active':''}" onclick="setLang('${l.c}', this)">
            <div style="font-size:1.6rem; margin-bottom:5px;">${l.f}</div>
            <div style="font-size:0.8rem;">${l.n}</div>
        </div>
    `).join('');
}

function setLang(c, el) {
    selectedLang = c;
    document.querySelectorAll('#langGrid .item-card').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
}

async function loadVoices() {
    const g = document.getElementById('spkGrid');
    try {
        const r = await fetch(`${API_BASE}/api/voices`);
        const d = await r.json();
        if(d.success) {
            d.voices.forEach(v => {
                const div = document.createElement('div');
                div.className = 'item-card';
                div.innerHTML = `<i class="fas fa-user-circle"></i><div style="font-size:0.8rem;">${v.name}</div>`;
                div.onclick = () => setVoice(v.url, div);
                g.appendChild(div);
            });
        }
    } catch(e) { console.error("Voices sync error"); }
}

function setVoice(url, el) {
    selectedVoiceUrl = url;
    document.querySelectorAll('#spkGrid .item-card').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
}

async function startDubbing() {
    const file = document.getElementById('mediaFile').files[0];
    if(!file) return alert("Please select a file first");

    const btn = document.getElementById('dubBtn');
    btn.disabled = true;
    document.getElementById('progressArea').style.display = 'block';
    document.getElementById('resCard').style.display = 'none';

    const fd = new FormData();
    fd.append('media_file', file);
    fd.append('voice_url', selectedVoiceUrl);
    fd.append('lang', selectedLang);

    try {
        const res = await fetch(`${API_BASE}/api/dub`, { method: 'POST', body: fd, credentials: 'include' });
        const data = await res.json();
        if(data.job_id) poll(data.job_id);
        else throw new Error(data.error || "Server error");
    } catch(e) {
        alert(e.message);
        btn.disabled = false;
        document.getElementById('progressArea').style.display = 'none';
    }
}

async function poll(id) {
    const timer = setInterval(async () => {
        try {
            const r = await fetch(`${API_BASE}/api/job/${id}`, { credentials: 'include' });
            const d = await r.json();
            if(d.status === 'completed') {
                clearInterval(timer);
                document.getElementById('resCard').style.display = 'block';
                document.getElementById('dubAud').src = d.audio_url;
                document.getElementById('dlBtn').href = d.audio_url;
                document.getElementById('dubBtn').disabled = false;
                document.getElementById('progFill').style.width = '100%';
                document.getElementById('pctTxt').innerText = '100%';
                checkAuth();
            } else if(d.status === 'failed') {
                clearInterval(timer);
                alert("Dubbing failed. Check logs.");
                document.getElementById('dubBtn').disabled = false;
            } else {
                let cur = parseInt(document.getElementById('progFill').style.width) || 10;
                let next = Math.min(95, cur + 2);
                document.getElementById('progFill').style.width = next + '%';
                document.getElementById('pctTxt').innerText = next + '%';
            }
        } catch(e) {}
    }, 4000);
}

async function checkAuth() {
    try {
        const r = await fetch(`${API_BASE}/api/user`, { credentials: 'include' });
        const d = await r.json();
        if(d.success) document.getElementById('authSection').innerHTML = `${d.user.name} | ${d.user.credits} 💰`;
        else document.getElementById('authSection').innerHTML = `<a href="login.html" style="color:#fff">Login</a>`;
    } catch(e) { document.getElementById('authSection').innerHTML = `<a href="login.html" style="color:#fff">Login</a>`; }
}
</script>
</body>
</html>
