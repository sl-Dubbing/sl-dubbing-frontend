<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Glotix | Dubbing Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-page: #fafafa; --bg-card: #ffffff; --border-color: #e5e7eb; --text-main: #0f0f10; --text-muted: #6b7280; --primary: #0f0f10; --primary-hover: #27272a; --accent-blue: #007aff; --accent-green: #10b981; --error: #ef4444; --radius-md: 12px; --radius-lg: 24px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-page); color: var(--text-main); min-height: 100vh; line-height: 1.5; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px 3%; }
        /* Header Styles */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 0 40px; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 1.6rem; font-weight: 900; text-decoration: none; color: var(--text-main); }
        .logo svg { width: 36px; height: 36px; }
        .user-zone { position: relative; display: flex; align-items: center; gap: 12px; }
        .menu-btn { background: var(--bg-card); border: 1px solid var(--border-color); padding: 10px 18px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 600; color: var(--text-main); transition: 0.2s; }
        .dropdown-panel { position: absolute; top: calc(100% + 12px); right: 0; width: 300px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); padding: 16px; display: flex; flex-direction: column; gap: 8px; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: 0.25s cubic-bezier(0.32, 0.72, 0, 1); z-index: 1000; }
        .dropdown-panel.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-panel a, .dropdown-panel button.menu-item { text-decoration: none; color: var(--text-main); padding: 12px 14px; border-radius: 10px; font-weight: 500; display: flex; align-items: center; gap: 14px; background: transparent; border: none; width: 100%; cursor: pointer; font-size: 1rem; text-align: left;}
        .auth-buttons { display: flex; gap: 10px; }
        .btn-login { background: var(--bg-page); border: 1px solid var(--border-color); flex: 1; padding: 12px; border-radius: 10px; text-align: center; text-decoration: none; color: var(--text-main); font-weight: 600; }
        .btn-signup { background: var(--primary); color: white; flex: 1; padding: 12px; border-radius: 10px; text-align: center; text-decoration: none; font-weight: 600; }
        .logged-in-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 16px; border-radius: 12px; display: none; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .balance-text { color: var(--accent-blue); font-weight: 700; background: #eff6ff; padding: 6px 10px; border-radius: 8px; display: flex; align-items: center; gap: 8px; width: fit-content; margin-top: 8px; }
        .logout-btn { color: var(--error) !important; display: none; }
    </style>
</head>
<body>
<div class="container">
    <header class="top-bar">
        <a class="logo" href="/">
            <svg viewBox="0 0 32 32" fill="none"><path d="M16 3C8.82 3 3 8.82 3 16C3 23.18 8.82 29 16 29C23.18 29 29 23.18 29 16V14H16V19H23.2C22.1 22.1 19.3 24 16 24C11.58 24 8 20.42 8 16C8 11.58 11.58 8 16 8C18.4 8 20.5 9.06 21.8 10.74L25.4 7.14C22.9 4.6 19.6 3 16 3Z" fill="#0f0f10"/><path d="M29 16C29 23.18 23.18 29 16 29V24C19.3 24 22.1 22.1 23.2 19H29V16Z" fill="#007aff"/></svg>
            Glotix
        </a>
        <div class="user-zone">
            <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i> Menu</button>
            <div class="dropdown-panel" id="mainMenuDropdown">
                <div class="auth-buttons" id="guestMenu">
                    <a href="/login" class="btn-login">Login</a>
                    <a href="/signup" class="btn-signup">Sign up</a>
                </div>
                <div class="logged-in-box" id="userMenu">
                    <div style="display:flex; align-items:center; gap:10px; font-weight:700;">
                        <img id="menuAvatar" class="user-avatar" src="https://www.gravatar.com/avatar/0?d=mp" alt="U">
                        <span id="menuUserName">Account</span>
                    </div>
                    <div class="balance-text"><i class="fas fa-coins"></i> <span id="menuCredits">...</span> Credits</div>
                </div>
                <hr style="border:none; border-top:1px solid #eee; margin:8px 0;">
                <a href="/dubbing"><i class="fas fa-film"></i> Dubbing Studio</a>
                <a href="/tts"><i class="fas fa-microphone"></i> Text to Speech</a>
                <a href="/stt"><i class="fas fa-file-alt"></i> Speech to Text</a>
                <hr style="border:none; border-top:1px solid #eee; margin:8px 0;">
                <a href="/history"><i class="fas fa-folder-open"></i> My Files</a>
                <button class="menu-item logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </header>

    <div class="upload-box" id="dropZone" onclick="document.getElementById('mediaFile').click()" style="border:2px dashed #ddd; border-radius:24px; padding:60px; text-align:center; cursor:pointer; background:#fff;">
        <input type="file" id="mediaFile" style="display:none;" accept="video/*,audio/*">
        <i class="fas fa-cloud-upload-alt" style="font-size:3.5rem; color:#007aff; margin-bottom:15px;"></i>
        <div style="font-weight:bold; font-size:1.3rem;">Click to Upload Media</div>
    </div>
    <div id="previewArea" style="display:none; margin-top:20px;"><video id="videoPreview" controls style="width:100%; border-radius:24px;"></video></div>
    <button id="dubBtn" style="display:none; width:100%; background:#0f0f10; color:#fff; padding:20px; border-radius:16px; margin-top:20px; font-weight:bold; cursor:pointer; border:none;">Start Dubbing</button>
    <div id="progressArea" style="display:none; margin-top:20px; background:#fff; padding:20px; border-radius:16px; border:1px solid #eee;">
        <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:10px;"><span id="statusTxt">Processing...</span> <span id="statusPct">0%</span></div>
        <div style="height:8px; background:#f0f0f0; border-radius:4px; overflow:hidden;"><div id="progFill" style="height:100%; width:0%; background:#007aff; transition:0.3s;"></div></div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/shared.js"></script>
<script src="js/languages-data.js"></script>
<script src="js/languages.js"></script>
<script src="js/lang-picker.js"></script>
<script src="js/dubbing.js"></script>
</body>
</html>
