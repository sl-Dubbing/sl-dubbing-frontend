<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>AI Smart Dubbing | sl-Dubbing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #f5f5f7; --card: #fff; --primary: #0f0f10; --mint: #a4fec4; --green-dk: #065f2c; --radius: 16px; }
        body { background: var(--bg); color: #111827; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        .topbar { background: var(--primary); padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; color: #fff; height: 60px; }
        .logo-top { font-weight: 800; font-size: 1.1rem; text-decoration: none; color: white; }
        .auth-btn { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 8px; cursor: pointer; text-decoration: none; }
        .wrap { max-width: 900px; margin: 30px auto; padding: 0 18px; }
        .card { background: #fff; border: 1px solid #e5e7eb; border-radius: var(--radius); padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .ttl { font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; font-size: 1.1rem; }
        .spk-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .item-card { padding: 18px 10px; border-radius: 14px; border: 1px solid #e5e7eb; text-align: center; cursor: pointer; transition: 0.3s; background: #fff; }
        .item-card.active { background: var(--mint); border-color: var(--primary); font-weight: 700; }
        .btn { background-color: #101010; color: white; width: 100%; height: 60px; border-radius: 30px; border: none; cursor: pointer; font-size: 1.1rem; font-weight: 600; transition: 0.3s; }
        .prog-bar { height: 10px; background: #e5e7eb; border-radius: 50px; overflow: hidden; margin-top: 10px; }
        .prog-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.5s ease; }
    </style>
</head>
<body>

<div class="topbar">
    <a href="index.html" class="logo-top">sl<span style="color:#a4fec4">-Dubbing</span></a>
    <div class="auth-section" id="authSection"><a href="login.html" class="auth-btn">Log In</a></div>
</div>

<div class="wrap">
    <div class="card">
        <div class="ttl"><i class="fas fa-file-upload"></i> 1. Upload Media</div>
        <input type="file" id="mediaFile" accept="video/*,audio/*">
    </div>

    <div class="card">
        <div class="ttl"><i class="fas fa-microphone-lines"></i> 2. Select Voice (Cloudinary Sync)</div>
        <div class="spk-grid" id="spkGrid">
            <div class="item-card active" onclick="selectVoice('', this)">Original</div>
        </div>
    </div>

    <div class="card">
        <button class="btn" id="generateBtn" onclick="startDubbing()">Dub My Media</button>
        <div id="progressArea" style="display:none; margin-top:20px;">
            <div style="display:flex; justify-content:space-between;"><span id="statusTxt">Analyzing...</span><span id="pctTxt">0%</span></div>
            <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
        </div>
    </div>

    <div class="card" id="resCard" style="display:none; border: 2px solid var(--green-dk);">
        <div class="ttl" style="color:var(--green-dk)">Result Ready!</div>
        <audio id="dubAud" controls style="width:100%"></audio>
    </div>
</div>

<script>
const API_BASE = 'https://web-production-14a1.up.railway.app';
let selectedVoiceUrl = '';

document.addEventListener('DOMContentLoaded', () => { checkAuth(); loadVoices(); });

async function loadVoices() {
    const res = await fetch(`${API_BASE}/api/voices`);
    const data = await res.json();
    if(data.success) {
        data.voices.forEach(v => {
            const d = document.createElement('div');
            d.className = 'item-card';
            d.innerText = v.name;
            d.onclick = () => selectVoice(v.url, d);
            document.getElementById('spkGrid').appendChild(d);
        });
    }
}

function selectVoice(url, el) {
    selectedVoiceUrl = url;
    document.querySelectorAll('.item-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
}

async function startDubbing() {
    const file = document.getElementById('mediaFile').files[0];
    if(!file) return alert("Select file");
    document.getElementById('progressArea').style.display = 'block';
    const fd = new FormData();
    fd.append('media_file', file); fd.append('voice_url', selectedVoiceUrl); fd.append('lang', 'ar');
    const res = await fetch(`${API_BASE}/api/dub`, { method: 'POST', body: fd, credentials: 'include' });
    const data = await res.json();
    if(data.job_id) poll(data.job_id);
}

async function poll(id) {
    const interval = setInterval(async () => {
        const res = await fetch(`${API_BASE}/api/job/${id}`, { credentials: 'include' });
        const data = await res.json();
        if(data.status === 'completed') {
            clearInterval(interval);
            document.getElementById('resCard').style.display = 'block';
            document.getElementById('dubAud').src = data.audio_url;
            document.getElementById('progFill').style.width = '100%';
            document.getElementById('pctTxt').innerText = '100%';
        } else {
            document.getElementById('progFill').style.width = '50%';
            document.getElementById('pctTxt').innerText = '50%';
        }
    }, 4000);
}

async function checkAuth() {
    const res = await fetch(`${API_BASE}/api/user`, { credentials: 'include' });
    const data = await res.json();
    if(data.success) document.getElementById('authSection').innerHTML = `<span style="color:#fff">${data.user.name} | ${data.user.credits} 💰</span>`;
}
</script>
</body>
</html>
