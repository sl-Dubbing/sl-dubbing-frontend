<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>sl-Dubbing | Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css"> <!-- تأكد من وجود ملف الـ CSS الأصلي -->
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>

    <style>
        /* 🎨 تنسيقات إضافية لدمج الهيكل القديم مع الجديد */
        body { background: #fdfdfd; margin: 0; }
        
        /* شريط علوي يحاكي صورتك الأولى */
        .top-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background: #fff; border-bottom: 1px solid #eee;
            position: sticky; top: 0; z-index: 1000;
        }
        .user-stats { background: #f3f4f6; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; color: #374151; }
        .site-logo { font-weight: 800; color: #3b82f6; font-size: 1.4rem; }

        .main-layout { display: flex; min-height: calc(100vh - 60px); }
        
        /* إعادة الشريط الجانبي */
        .sidebar-fixed {
            width: 260px; background: #fff; border-left: 1px solid #eee;
            padding: 20px; display: flex; flex-direction: column; gap: 20px;
        }

        .workspace-container { flex: 1; padding: 30px; max-width: 1000px; margin: 0 auto; }

        /* ستايل القائمة المنسدلة (أبيض وأسود) */
        .dropdown-box {
            position: absolute; top: 110%; left: 0; width: 280px;
            background: #fff !important; border: 1px solid #ddd;
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none; z-index: 100; padding: 15px; color: #000 !important;
        }
        .icon-btn.active .dropdown-box { display: block; }
        .lang-opt { padding: 10px; color: #000 !important; border-radius: 8px; }
        .lang-opt:hover { background: #f3f4f6; }

        /* نمط السينما السفلي */
        .cinema-box {
            display: flex; gap: 15px; flex-direction: row-reverse;
            background: #000; padding: 15px; border-radius: 20px; margin-top: 30px;
        }
        .player-area { flex: 3; position: relative; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
        .dl-icon-badge { position: absolute; top: 15px; right: 15px; z-index: 100; }
        .dl-circle { background: #fff; color: #000; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; text-decoration: none; }
        
        .side-langs { flex: 1; background: #111; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .side-lang-item { padding: 10px; border-radius: 8px; background: #1a1a1a; color: #888; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .side-lang-item.active { background: #fff; color: #000; font-weight: bold; }
    </style>
</head>
<body>

<!-- 1. الشريط العلوي (Top Bar) -->
<header class="top-header">
    <div style="display:flex; align-items:center; gap:15px;">
        <button id="menuToggle" style="background:none; border:none; font-size:1.2rem; cursor:pointer;"><i class="fas fa-bars"></i> القائمة</button>
        <div class="site-logo">sl-Dubbing</div>
    </div>
    <div class="user-stats">
        <i class="fas fa-coins" style="color:#f59e0b;"></i> <span id="userPoints">18100 نقطة</span>
    </div>
</header>

<div class="main-layout">
    <!-- 2. الشريط الجانبي (Sidebar) -->
    <aside class="sidebar-fixed" id="mainSidebar">
        <div style="font-weight:bold; color:#6b7280; font-size:0.8rem; letter-spacing:1px;">لوحة التحكم</div>
        <nav style="display:flex; flex-direction:column; gap:10px;">
            <a href="#" style="text-decoration:none; color:#000; font-weight:bold;"><i class="fas fa-film"></i> استوديو الدبلجة</a>
            <a href="#" style="text-decoration:none; color:#6b7280;"><i class="fas fa-folder"></i> ملفاتي</a>
            <a href="#" style="text-decoration:none; color:#6b7280;"><i class="fas fa-microphone"></i> تحويل النص لصوت</a>
        </nav>
    </aside>

    <!-- 3. منطقة العمل الرئيسية -->
    <main class="workspace-container">
        <div style="background:#fff; border:1px solid #eee; border-radius:20px; padding:40px; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.02);">
            <div id="dropZone" onclick="document.getElementById('mediaFile').click()" style="border:2px dashed #ddd; border-radius:15px; padding:40px; cursor:pointer;">
                <input type="file" id="mediaFile" style="display:none;">
                <i class="fas fa-cloud-upload-alt" style="font-size:3rem; color:#3b82f6; margin-bottom:15px;"></i>
                <div style="font-weight:bold; font-size:1.2rem;">اسحب الملف هنا أو اضغط للاختيار</div>
            </div>

            <div style="display:flex; justify-content:space-between; margin-top:25px; gap:15px;">
                <div class="icon-btn" id="langTrigger" style="position:relative; border:1px solid #eee; padding:12px; border-radius:10px; cursor:pointer; flex:1;" onclick="this.classList.toggle('active')">
                    <i class="fas fa-globe"></i> اختر اللغات
                    <div class="dropdown-box" onclick="event.stopPropagation()">
                        <div id="langList">
                            <!-- اللغات هنا (بيضاء بنص أسود) -->
                        </div>
                    </div>
                </div>
                <div style="display:flex; gap:10px;">
                    <div style="border:1px solid #eee; padding:10px; border-radius:10px; display:flex; align-items:center; gap:8px;">
                        <span>إخراج فيديو</span> <input type="checkbox" id="videoToggle" checked>
                    </div>
                    <div style="border:1px solid #eee; padding:10px; border-radius:10px; display:flex; align-items:center; gap:8px;">
                        <span>مزامنة شفاه</span> <input type="checkbox" id="lipsyncToggle">
                    </div>
                </div>
            </div>

            <button id="dubBtn" style="width:100%; padding:18px; background:#000; color:#fff; border:none; border-radius:12px; font-weight:bold; margin-top:20px; cursor:pointer; display:none;">بدء الدبلجة الآن</button>
        </div>

        <!-- 4. نتائج السينما (النمط الذي أعجبك) -->
        <div id="resultsCard" style="display:none;">
            <div class="cinema-box">
                <aside class="side-langs" id="sideLangs"></aside>
                <div class="player-area">
                    <div id="dlBadge" class="dl-icon-badge" style="display:none;">
                        <a id="masterDl" href="#" target="_blank" class="dl-circle"><i class="fas fa-download"></i></a>
                    </div>
                    <div id="playerView" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:#333;">
                        <i class="fas fa-spinner fa-spin fa-2x"></i>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="js/dubbing.js"></script> <!-- تأكد من تحديث دالة switchCinemaLanguage لتناسب الـ IDs الجديدة -->
</body>
</html>
