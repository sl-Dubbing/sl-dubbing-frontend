<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>sl-Dubbing | استوديو الدبلجة الاحترافي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  
  <!-- 🌟 مكتبة الموجات الصوتية (WaveSurfer) -->
  <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>

  <style>
    /* التنسيقات العامة */
    body { 
      background: linear-gradient(135deg, #eef2ff 0%, #fdf4ff 100%); 
      display: flex; flex-direction: column; min-height: 100vh; font-family: system-ui, -apple-system, sans-serif; 
    }
    .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    .workspace-wrapper { width: 100%; max-width: 1000px; }

    .workspace-header { text-align: center; margin-bottom: 30px; }
    .workspace-header h1 { font-size: 2.4rem; color: #111827; font-weight: 800; }

    /* المربع الرئيسي */
    .dub-workspace { 
      background: #fff; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); 
      padding: 40px; border: 1px solid #f3f4f6; margin-bottom: 20px;
    }
    
    .media-zone { 
      width: 100%; min-height: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
      cursor: pointer; transition: 0.3s; background: #f9fafb; border: 2px dashed #d1d5db; border-radius: 15px;
    }
    .media-zone:hover { border-color: #3b82f6; background: #eff6ff; }
    .upload-icon { font-size: 3.5rem; color: #3b82f6; margin-bottom: 15px; }

    /* --- تصميم نمط السينما (Cinema Layout) --- */
    .cinema-layout { 
      display: flex; gap: 20px; flex-direction: row-reverse; 
      background: #0f172a; padding: 25px; border-radius: 20px; 
      box-shadow: 0 20px 50px rgba(0,0,0,0.2); margin-top: 30px;
    }
    
    /* المشغل الرئيسي */
    .player-section { flex: 2.5; display: flex; flex-direction: column; gap: 15px; }
    .main-viewer { 
      width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; 
      overflow: hidden; display: flex; align-items: center; justify-content: center; 
      border: 1px solid #1e293b; position: relative;
    }
    .player-placeholder { text-align: center; color: #475569; }
    .player-placeholder i { font-size: 3rem; margin-bottom: 10px; }

    /* القائمة الجانبية (اللغات) */
    .lang-sidebar { 
        flex: 1; background: #1e293b; border-radius: 15px; padding: 15px; 
        display: flex; flex-direction: column; gap: 10px; min-width: 250px; 
        max-height: 500px; overflow-y: auto;
    }
    .sidebar-header { 
        color: #94a3b8; font-size: 0.9rem; font-weight: bold; 
        padding-bottom: 10px; border-bottom: 1px solid #334155; 
        display: flex; gap: 8px; align-items: center; 
    }
    
    .lang-item { 
        padding: 12px 15px; border-radius: 10px; background: #334155; 
        color: #cbd5e1; cursor: pointer; transition: 0.3s; 
        display: flex; align-items: center; gap: 12px; border: 2px solid transparent; 
    }
    .lang-item:hover { background: #475569; transform: translateX(-5px); }
    .lang-item.active { background: #1e293b; border-color: #3b82f6; color: #fff; box-shadow: 0 0 15px rgba(59,130,246,0.3); }
    .lang-item.loading { opacity: 0.6; cursor: wait; }

    /* زر التحميل */
    .download-footer { display: flex; flex-direction: column; gap: 10px; }
    .active-info { color: white; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
    .premium-dl-btn { 
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); 
        color: white; padding: 15px; border-radius: 12px; text-decoration: none; 
        display: flex; align-items: center; justify-content: center; gap: 10px; 
        font-weight: bold; transition: 0.3s; 
    }
    .premium-dl-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(37,99,235,0.4); }

    /* شريط الأدوات */
    .action-bar { display: flex; justify-content: space-between; margin-top: 20px; width: 100%; }
    .icon-btn { 
      background: #fff; padding: 12px 18px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); 
      cursor: pointer; display: flex; align-items: center; gap: 10px; border: 1px solid #f3f4f6; position: relative;
    }
    .dropdown-box { 
        position: absolute; top: calc(100% + 10px); left: 0; width: 280px; 
        background: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        border: 1px solid #e2e8f0; display: none; z-index: 100; padding: 15px;
    }
    .icon-btn.active .dropdown-box { display: block; }

    .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e5e7eb; transition: .4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #10b981; }
    input:checked + .slider:before { transform: translateX(20px); }

    .start-btn { width: 100%; margin-top: 25px; padding: 18px; background: #3b82f6; color: #fff; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(59,130,246,0.3); }

    @media (max-width: 850px) { .cinema-layout { flex-direction: column; } }
  </style>
</head>
<body>

<header class="top-bar">
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="menu-btn" id="menuBtn" type="button"><i class="fas fa-bars"></i><span>القائمة</span></button>
    <div class="top-logo"><h2>sl-Dubbing</h2></div>
  </div>
  <span class="account-badge" id="topAccountBadge">جاري التحميل...</span>
</header>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-user-section" id="authSection"></div>
  <nav class="sidebar-nav">
    <ul>
      <li><a href="dubbing.html" class="active"><i class="fas fa-film"></i> استوديو الدبلجة</a></li>
      <li><a href="history.html"><i class="fas fa-folder-open"></i> ملفاتي</a></li>
    </ul>
  </nav>
</aside>

<main class="main-content">
  <div class="workspace-wrapper">
    
    <header class="workspace-header">
      <h1>استوديو الدبلجة الاحترافي</h1>
    </header>

    <div class="dub-workspace">
      <section class="media-zone" id="dropZone" onclick="document.getElementById('mediaFile').click()">
        <input type="file" id="mediaFile" accept="video/*,audio/*" style="display:none;">
        <div id="uploadPlaceholder">
          <i class="fas fa-cloud-upload-alt upload-icon"></i>
          <div style="font-weight:bold; font-size:1.1rem;">اسحب الملف هنا أو اضغط للاختيار</div>
        </div>
        <div id="previewContainer" style="display:none; width:100%;">
          <video id="videoPreview" controls style="width:100%; border-radius:10px;"></video>
          <div id="audioLabel" style="display:none; text-align:center; padding:30px;">
            <i class="fas fa-file-audio" style="font-size:3rem; color:#3b82f6;"></i>
            <p id="audioName" style="margin-top:10px; font-weight:bold;"></p>
          </div>
        </div>
      </section>

      <div class="action-bar">
        <div style="display:flex; flex-direction:column; gap:10px;">
          <div class="icon-btn" id="videoOpt">
            <label class="switch"><input type="checkbox" id="videoToggle" checked><span class="slider"></span></label>
            <span>إخراج فيديو</span>
          </div>
          <div class="icon-btn" id="lipsyncOpt">
            <label class="switch"><input type="checkbox" id="lipsyncToggle"><span class="slider"></span></label>
            <span>مزامنة الشفاه</span>
          </div>
        </div>

        <div style="display:flex; gap:15px;">
          <div class="icon-btn" id="voiceTrigger" onclick="toggleDrop('voiceTrigger')">
            <i class="fas fa-head-side-voice"></i><span>نبرة الصوت</span>
            <div class="dropdown-box" onclick="event.stopPropagation()">
                <select id="voiceSelect" style="width:100%; padding:10px; border-radius:8px;">
                    <option value="source">استنساخ الصوت الأصلي</option>
                    <option value="male_pro">صوت ذكر احترافي</option>
                    <option value="female_pro">صوت أنثى احترافي</option>
                </select>
            </div>
          </div>

          <div class="icon-btn" id="langTrigger" onclick="toggleDrop('langTrigger')">
            <i class="fas fa-globe"></i><span>اللغات</span>
            <div class="dropdown-box" onclick="event.stopPropagation()">
                <div id="langList" style="max-height:200px; overflow-y:auto;"></div>
            </div>
          </div>
        </div>
      </div>

      <button id="dubBtn" class="start-btn" style="display:none;">بدء الدبلجة الآن</button>

      <div id="progressArea" style="display:none; margin-top:20px;">
        <div style="height:8px; background:#e5e7eb; border-radius:4px; overflow:hidden;">
            <div id="progFill" style="height:100%; width:0%; background:#3b82f6; transition:0.3s;"></div>
        </div>
        <p id="statusTxt" style="text-align:center; margin-top:10px; font-size:0.9rem; color:#6b7280;"></p>
      </div>
    </div>

    <!-- كارت النتائج السينمائي -->
    <div id="resultsCard" style="display:none;">
        <div class="cinema-layout">
            <aside class="lang-sidebar">
                <div class="sidebar-header"><i class="fas fa-language"></i><span>اللغات الجاهزة</span></div>
                <div id="langSidebarList"></div>
            </aside>
            <main class="player-section">
                <div id="mainMediaWrapper" class="main-viewer">
                    <div class="player-placeholder"><i class="fas fa-film fa-spin"></i><p>بانتظار المعالجة...</p></div>
                </div>
                <div id="downloadArea" class="download-footer" style="display:none;">
                    <div class="active-info"><span id="activeLangFlag"></span> <strong id="activeLangName"></strong></div>
                    <a id="masterDownloadBtn" href="#" target="_blank" class="premium-dl-btn"><i class="fas fa-cloud-download-alt"></i>تحميل النسخة المختارة</a>
                </div>
            </main>
        </div>
    </div>

  </div>
</main>

<script src="js/config.js"></script>
<script src="js/shared.js"></script>
<script src="js/languages-data.js"></script>
<script src="js/lang-picker.js"></script>

<script>
// --- dubbing.js V8.5 (Integrated Cinema Mode) ---

let dubbingResults = {}; 

async function startDubbing() {
    const file = document.getElementById('mediaFile')?.files?.[0];
    const token = localStorage.getItem('token');
    if (!token || !file || !window.selectedLangs?.size) return showToast('تأكد من اختيار الملف واللغات', '#ef4444');

    const dubBtn = document.getElementById('dubBtn');
    const progressArea = document.getElementById('progressArea');
    const resultsCard = document.getElementById('resultsCard');
    const statusTxt = document.getElementById('statusTxt');
    const progFill = document.getElementById('progFill');

    dubBtn.style.display = 'none';
    progressArea.style.display = 'block';
    resultsCard.style.display = 'block';
    document.getElementById('langSidebarList').innerHTML = ''; 
    dubbingResults = {}; 

    try {
        // 1. الرفع
        statusTxt.innerText = '📤 جاري الرفع...';
        const urlRes = await fetch(`${window.API_BASE}/api/upload-url`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename: file.name, content_type: file.type, size: file.size })
        });
        const urlData = await urlRes.json();
        await uploadToR2(urlData.upload_url, file, (pct) => {
            progFill.style.width = (pct * 0.4) + '%';
            statusTxt.innerText = `جاري الرفع: ${pct.toFixed(0)}%`;
        });

        // 2. الدبلجة
        const langs = [...window.selectedLangs];
        const isLipSync = document.getElementById('lipsyncToggle').checked;
        const isVideo = document.getElementById('videoToggle').checked;
        
        const promises = langs.map(async (langCode) => {
            const lang = window.LANGUAGES.find(l => l.code === langCode);
            const sideItem = document.createElement('div');
            sideItem.id = `side-${langCode}`;
            sideItem.className = 'lang-item loading';
            sideItem.innerHTML = `<i class="fas fa-spinner fa-spin"></i> <span>${lang.name_ar}</span>`;
            document.getElementById('langSidebarList').appendChild(sideItem);

            try {
                const res = await fetch(`${window.API_BASE}/api/dub`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        file_key: urlData.file_key,
                        lang: langCode,
                        voice_id: document.getElementById('voiceSelect').value,
                        with_lipsync: isLipSync,
                        return_video: isVideo
                    })
                });
                const data = await res.json();
                const finalData = await waitForJob(data.job_id, token);

                dubbingResults[langCode] = { url: finalData.output_url, name: lang.name_ar, flag: lang.flag };
                sideItem.className = 'lang-item';
                sideItem.innerHTML = `<span>${lang.flag}</span> <span>${lang.name_ar}</span> <i class="fas fa-check-circle" style="color:#10b981; margin-right:auto;"></i>`;
                sideItem.onclick = () => switchCinemaLanguage(langCode);

                if (Object.keys(dubbingResults).length === 1) switchCinemaLanguage(langCode);
            } catch (e) { sideItem.innerHTML = `❌ <span>${lang.name_ar}</span>`; }
        });

        await Promise.all(promises);
        statusTxt.innerText = '✓ اكتملت المعالجة!';
        progFill.style.width = '100%';
    } catch (e) { showToast(e.message, '#ef4444'); }
    finally { dubBtn.style.display = 'block'; }
}

function switchCinemaLanguage(langCode) {
    const res = dubbingResults[langCode];
    const wrapper = document.getElementById('mainMediaWrapper');
    document.querySelectorAll('.lang-item').forEach(el => el.classList.remove('active'));
    document.getElementById(`side-${langCode}`).classList.add('active');

    // التحقق من نوع الرابط (يتعامل مع روابط R2 الطويلة)
    const isMp4 = res.url.toLowerCase().includes('.mp4');
    if (isMp4) {
        wrapper.innerHTML = `<video controls autoplay src="${res.url}" style="width:100%; height:100%;"></video>`;
    } else {
        wrapper.innerHTML = `<div style="width:80%;"><div id="cinemaWave"></div><p style="color:white; text-align:center; margin-top:10px;">${res.name}</p></div>`;
        WaveSurfer.create({ container: '#cinemaWave', waveColor: '#3b82f6', height: 80, url: res.url }).on('ready', function() { this.play(); });
    }

    document.getElementById('downloadArea').style.display = 'flex';
    document.getElementById('activeLangFlag').innerText = res.flag;
    document.getElementById('activeLangName').innerText = res.name;
    document.getElementById('masterDownloadBtn').href = res.url;
}

function uploadToR2(url, file, onProgress) {
    return new Promise((resolve) => {
        const xhr = new XMLHttpRequest();
        xhr.open('PUT', url, true);
        xhr.upload.onprogress = (e) => onProgress((e.loaded / e.total) * 100);
        xhr.onload = () => resolve();
        xhr.send(file);
    });
}

async function waitForJob(jobId, token) {
    while (true) {
        const res = await fetch(`${window.API_BASE}/api/job/${jobId}`, { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        if (data.status === 'completed') return data;
        if (data.status === 'failed') throw new Error('فشلت المعالجة');
        await new Promise(r => setTimeout(r, 4000));
    }
}

function toggleDrop(id) {
    const el = document.getElementById(id);
    const isActive = el.classList.contains('active');
    document.querySelectorAll('.icon-btn').forEach(btn => btn.classList.remove('active'));
    if (!isActive) el.classList.add('active');
}

document.getElementById('mediaFile').onchange = function() {
    const file = this.files[0];
    if (file) {
        document.getElementById('uploadPlaceholder').style.display = 'none';
        document.getElementById('previewContainer').style.display = 'block';
        document.getElementById('dubBtn').style.display = 'block';
        if (file.type.startsWith('video/')) {
            document.getElementById('videoPreview').src = URL.createObjectURL(file);
            document.getElementById('videoPreview').style.display = 'block';
            document.getElementById('audioLabel').style.display = 'none';
        } else {
            document.getElementById('videoPreview').style.display = 'none';
            document.getElementById('audioLabel').style.display = 'block';
            document.getElementById('audioName').innerText = file.name;
        }
    }
};

document.getElementById('dubBtn').onclick = startDubbing;
</script>

</body>
</html>
