<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>سجل الدبلجة | sl-Dubbing</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="top-bar">
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i><span>القائمة</span></button>
    <div class="top-logo"><h2>sl-Dubbing</h2></div>
  </div>
  <span class="account-badge" id="topAccountBadge">جاري التحميل...</span>
</header>
<div class="overlay" id="overlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-user-section" id="authSection"></div>
  <nav class="sidebar-nav">
    <ul>
      <li><a href="index.html"><i class="fas fa-home"></i> الرئيسية</a></li>
      <li><a href="dubbing.html"><i class="fas fa-film"></i> استوديو الدبلجة</a></li>
      <li><a href="history.html" class="active"><i class="fas fa-history"></i> عملياتي السابقة</a></li>
    </ul>
  </nav>
</aside>
<main class="main-content">
  <div class="container">
    <header class="main-header">
      <h1>سجل الدبلجة الخاص بك</h1>
      <p class="lead">استمع وحمّل جميع أعمالك السابقة</p>
    </header>
    <section class="card">
      <div id="historyList" class="history-grid">
        <div style="text-align:center;padding:40px;color:#9aa1ac;">جاري تحميل السجل...</div>
      </div>
    </section>
  </div>
</main>
<script src="js/config.js"></script>
<script src="js/shared.js"></script>
<script>
  async function loadHistory() {
    const token = localStorage.getItem('token');
    const listEl = document.getElementById('historyList');
    if (!token) { listEl.innerHTML = 'يرجى تسجيل الدخول لعرض السجل.'; return; }
    try {
        const res = await fetch(`${window.API_BASE}/api/history`, { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        if (!data.history || data.history.length === 0) { listEl.innerHTML = 'لا توجد عمليات سابقة.'; return; }
        listEl.innerHTML = data.history.map(item => `
            <div class="result-item" style="margin-bottom:15px; padding:15px; border:1px solid #eee; border-radius:12px;">
                <div class="result-item-header" style="display:flex; justify-content:space-between;">
                    <span style="font-weight:600;"><i class="fas fa-file-audio"></i> ${escapeHtml(item.filename)}</span>
                    <span class="status-badge ${item.status}">${item.status === 'completed' ? 'مكتمل' : (item.status === 'failed' ? 'فشل' : 'معالجة')}</span>
                </div>
                <div style="margin-top:10px;">
                    <div style="font-size:0.8rem; color:#888;">اللغة: ${item.lang} | التاريخ: ${new Date(item.created_at).toLocaleDateString()}</div>
                    ${item.audio_url ? `
                        <audio controls src="${item.audio_url}" style="width:100%; margin-top:10px; height:35px;"></audio>
                        <a href="${item.audio_url}" download class="btn-download" style="display:inline-block; margin-top:10px; font-size:0.8rem; padding:8px 15px; background:#007aff; color:#fff; border-radius:8px; text-decoration:none;">
                            <i class="fas fa-download"></i> تحميل الصوت
                        </a>
                    ` : ''}
                </div>
            </div>
        `).join('');
    } catch (e) { listEl.innerHTML = 'فشل تحميل السجل.'; }
  }
  document.addEventListener('DOMContentLoaded', loadHistory);
</script>
</body>
</html>
