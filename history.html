<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ملفاتي | sl-Dubbing</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .file-manager-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .folder-section { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
    .folder-card { background: #f8f9fa; border: 1px solid #eee; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
    .folder-card:hover { background: #eef2ff; border-color: #007aff; }
    .file-row { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; gap: 15px; }
    .file-actions { margin-right: auto; display: flex; gap: 8px; }
    .expiry-tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; background: #fff3cd; color: #856404; }
  </style>
</head>
<body>

<header class="top-bar">
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i><span>القائمة</span></button>
    <div class="top-logo"><h2>sl-Dubbing</h2></div>
  </div>
</header>

<div class="overlay" id="overlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-user-section" id="authSection"></div>
  <nav class="sidebar-nav">
    <ul>
      <li><a href="dubbing.html"><i class="fas fa-film"></i> استوديو الدبلجة</a></li>
      <li><a href="history.html" class="active"><i class="fas fa-folder-open"></i> ملفاتي</a></li>
    </ul>
  </nav>
</aside>

<main class="main-content">
  <div class="container">
    <div class="file-manager-header">
      <h1>مجلد ملفاتي</h1>
      <button class="btn-secondary" onclick="createNewFolder()"><i class="fas fa-folder-plus"></i> مجلد جديد</button>
    </div>

    <div id="folderContainer" class="folder-section">
      <!-- المجلدات ستظهر هنا -->
    </div>

    <section class="card">
      <h3 id="currentFolderName">كافة الملفات</h3>
      <div id="fileList">
        <div style="text-align:center;padding:40px;color:#9aa1ac;">جاري فتح المجلد...</div>
      </div>
    </section>
  </div>
</main>

<script src="js/config.js"></script>
<script src="js/shared.js"></script>
<script>
  let allFiles = [];
  let folders = new Set(['الرئيسية']);

  async function loadFileManager() {
    const token = localStorage.getItem('token');
    if (!token) return;

    try {
        const res = await fetch(`${window.API_BASE}/api/history`, { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        allFiles = data.history;
        
        allFiles.forEach(f => folders.add(f.folder));
        renderFolders();
        renderFiles('الرئيسية');
    } catch (e) { console.error(e); }
  }

  function renderFolders() {
    const container = document.getElementById('folderContainer');
    container.innerHTML = Array.from(folders).map(name => `
      <div class="folder-card" onclick="renderFiles('${name}')">
        <i class="fas fa-folder" style="font-size: 2rem; color: #ffca28; margin-bottom: 10px; display: block;"></i>
        <span>${name}</span>
      </div>
    `).join('');
  }

  function renderFiles(folderName) {
    document.getElementById('currentFolderName').innerText = `مجلد: ${folderName}`;
    const listEl = document.getElementById('fileList');
    const filtered = allFiles.filter(f => f.folder === folderName);

    if (filtered.length === 0) {
        listEl.innerHTML = '<div style="padding:20px; color:#9aa1ac;">لا توجد ملفات في هذا المجلد.</div>';
        return;
    }

    listEl.innerHTML = filtered.map(f => `
      <div class="file-row">
        <i class="fas fa-file-video" style="color:#6366f1;"></i>
        <div style="flex:1;">
          <div style="font-weight:600;">${escapeHtml(f.name)} <span class="expiry-tag">يحذف بعد ${f.expires_in} يوم</span></div>
          <div style="font-size:0.75rem; color:#888;">اللغة: ${f.lang} | التاريخ: ${new Date(f.created_at).toLocaleDateString()}</div>
        </div>
        <div class="file-actions">
          ${f.audio_url ? `<button class="btn-icon" onclick="window.open('${f.audio_url}')"><i class="fas fa-play"></i></button>` : ''}
          <button class="btn-icon" onclick="renameFile(${f.id})"><i class="fas fa-edit"></i></button>
          <button class="btn-icon" onclick="moveFile(${f.id})"><i class="fas fa-exchange-alt"></i></button>
          ${f.audio_url ? `<a href="${f.audio_url}" download class="btn-icon"><i class="fas fa-download"></i></a>` : ''}
        </div>
      </div>
    `).join('');
  }

  async function renameFile(id) {
    const newName = prompt("أدخل الاسم الجديد للملف:");
    if (!newName) return;
    const res = await fetch(`${window.API_BASE}/api/file/rename`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
      body: JSON.stringify({ id, new_name: newName })
    });
    if (res.ok) loadFileManager();
  }

  async function moveFile(id) {
    const folderName = prompt("إلى أي مجلد تريد النقل؟ (الرئيسية، العمل، إلخ...)");
    if (!folderName) return;
    const res = await fetch(`${window.API_BASE}/api/file/move`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
      body: JSON.stringify({ id, folder_name: folderName })
    });
    if (res.ok) { folders.add(folderName); loadFileManager(); }
  }

  function createNewFolder() {
    const name = prompt("اسم المجلد الجديد:");
    if (name) { folders.add(name); renderFolders(); }
  }

  document.addEventListener('DOMContentLoaded', loadFileManager);
</script>
</body>
</html>
