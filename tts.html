<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>sl-Dubbing Studio | تحويل النص إلى صوت</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .studio-container { max-width: 1600px; margin: 0 auto; padding: 20px; }
    .studio-grid { display: grid; grid-template-columns: 1fr 320px; gap: 24px; align-items: start; }

    /* 📝 المحرر الاحترافي */
    .main-editor-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; display: flex; flex-direction: column; overflow: visible; }
    .editor-textarea { width: 100%; min-height: 550px; padding: 25px; border: none; resize: vertical; font-size: 1.15rem; color: #000; background: transparent; outline: none; line-height: 1.8; font-family: inherit; }
    
    /* 🎛️ شريط الأدوات السفلي */
    .editor-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #fcfcfc; border-top: 1px solid #eee; border-radius: 0 0 12px 12px; }
    
    /* 🌍 القائمة المنسدلة المخصصة */
    .custom-dropdown { position: relative; user-select: none; z-index: 100; }
    .dropdown-selected { padding: 10px 15px; border-radius: 8px; border: 1px solid #e5e7eb; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 0.9rem; font-weight: 600; color: #000; min-width: 220px; }
    .dropdown-menu { position: absolute; top: 100%; right: 0; background: #fff; border: 1px solid #eee; border-radius: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); width: 240px; list-style: none; padding: 5px 0; display: none; margin-top: 5px; }
    .custom-dropdown.open .dropdown-menu { display: block; }
    .dropdown-menu li { padding: 10px 15px; cursor: pointer; font-size: 0.9rem; color: #000; display: flex; justify-content: space-between; }
    .dropdown-menu li:hover { background: #f8fafc; }
    .has-submenu > .submenu { position: absolute; right: 100%; top: -5px; background: #fff; border: 1px solid #eee; border-radius: 8px; width: 180px; display: none; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
    .has-submenu:hover > .submenu { display: block; }

    /* 🎛️ أيقونات سوداء نقيّة (Minimal) */
    .toolbar-left { display: flex; align-items: center; gap: 18px; }
    .char-counter { font-size: 0.8rem; color: #999; font-weight: 600; margin-left: 5px; }
    
    .btn-tool { background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.35rem; transition: 0.2s; color: #000; padding: 4px; outline: none; }
    .btn-tool:hover:not(:disabled) { transform: scale(1.15); opacity: 0.6; }
    .btn-tool:disabled { color: #ddd; cursor: not-allowed; }
    .btn-tool.active-mic { color: #ef4444; animation: blink 1.5s infinite; }

    /* ⚙️ لوحة الإعدادات الجانبية */
    .settings-sidebar { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; }
    .settings-group { margin-bottom: 30px; }
    .settings-title { font-size: 0.9rem; font-weight: 800; color: #000; margin-bottom: 15px; display: flex; justify-content: space-between; }
    
    /* شريط السرعة الأسود */
    .slider-container { display: flex; flex-direction: column; gap: 12px; }
    .styled-slider { width: 100%; cursor: pointer; accent-color: #000; appearance: none; height: 3px; background: #eee; }
    .styled-slider::-webkit-slider-thumb { appearance: none; width: 14px; height: 14px; background: #000; border-radius: 50%; }
    .slider-labels { display: flex; justify-content: space-between; font-size: 0.7rem; color: #bbb; }

    .mode-option { padding: 12px; background: #fcfcfc; border: 1px solid #eee; border-radius: 8px; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
    .mode-option.active { border-color: #000; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .mode-title { font-weight: 800; font-size: 0.85rem; color: #000; }

    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
  </style>
</head>
<body data-mode="fast">

<header class="top-bar">
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
    <div class="top-logo"><h2>sl-Dubbing</h2></div>
  </div>
</header>

<main class="main-content">
  <div class="studio-container">
    <div class="studio-grid">
      
      <div class="main-editor-card">
        <textarea id="ttsInput" class="editor-textarea" placeholder="ضع المؤشر في أي مكان للبدء بالقراءة من هناك، أو اضغط تنزيل للحصول على الملف كاملاً..."></textarea>
        
        <div class="editor-toolbar">
          <div class="toolbar-right">
            <div class="custom-dropdown" id="langDropdown">
              <div class="dropdown-selected" id="langSelected">
                <div><span class="flag">🇸🇦</span> <span class="name">العربية (السعودية)</span></div>
                <i class="fas fa-chevron-down"></i>
              </div>
              <ul class="dropdown-menu" id="langMenu"></ul>
            </div>
          </div>
          
          <div class="toolbar-left">
            <span class="char-counter"><span id="charCount">0</span> حرف</span>
            
            <button id="ttsFixBtn" class="btn-tool" title="تدقيق إملائي"><i class="fas fa-wand-magic-sparkles"></i></button>
            <button id="sttMicBtn" class="btn-tool" title="إملاء صوتي"><i class="fas fa-microphone"></i></button>
            <button id="ttsDownloadBtn" class="btn-tool" title="تنزيل النص كاملاً بالسرعة المختارة"><i class="fas fa-download"></i></button>
            <button id="ttsStopBtn" class="btn-tool" title="إيقاف" style="display:none;"><i class="fas fa-stop"></i></button>
            <button id="ttsPlayBtn" class="btn-tool" title="تشغيل من مكان المؤشر"><i class="fas fa-play"></i></button>
          </div>
        </div>
      </div>

      <div class="settings-sidebar">
        <div class="settings-group">
          <div class="settings-title"><span>النموذج (Model)</span></div>
          <div class="mode-switcher">
            <div class="mode-option active" data-mode="fast"><div class="mode-title">الوضع السريع ⚡</div></div>
            <div class="mode-option" data-mode="quality"><div class="mode-title">جودة عالية 💎</div></div>
          </div>
        </div>

        <div class="settings-group">
          <div class="settings-title"><span>السرعة (Speed)</span> <span id="speedValueTxt">طبيعي</span></div>
          <div class="slider-container">
            <input type="range" id="speedSlider" class="styled-slider" min="-50" max="50" value="0">
            <div class="slider-labels"><span>أبطأ</span><span>أسرع</span></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<div id="toasts"></div>
<script src="js/shared.js"></script>
<script src="js/languages-data.js"></script>
<script src="js/tts.js"></script>
</body>
</html>
