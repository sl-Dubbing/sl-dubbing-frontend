<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>تحويل النص إلى صوت | sl-Dubbing Studio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .studio-container { max-width: 1600px; margin: 0 auto; padding: 20px; }
    .studio-grid { display: grid; grid-template-columns: 1fr 320px; gap: 24px; align-items: start; }

    /* 📝 المحرر العملاق */
    .main-editor-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; display: flex; flex-direction: column; overflow: visible; }
    .editor-textarea { width: 100%; min-height: 500px; padding: 25px; border: none; resize: vertical; font-size: 1.1rem; color: #1a1d23; background: transparent; outline: none; line-height: 1.8; }
    
    /* 🎛️ شريط الأدوات السفلي */
    .editor-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #f8fafc; border-top: 1px solid #e5e7eb; border-radius: 0 0 12px 12px; }
    
    /* 🌍 القائمة المنسدلة */
    .custom-dropdown { position: relative; user-select: none; z-index: 50; }
    .dropdown-selected { padding: 10px 15px; border-radius: 8px; border: 1px solid #cbd5e1; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 0.95rem; font-weight: 600; color: #475569; min-width: 220px; }
    .dropdown-menu { position: absolute; top: 100%; right: 0; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 240px; list-style: none; padding: 5px 0; display: none; }
    .custom-dropdown.open .dropdown-menu { display: block; }
    .dropdown-menu li { padding: 10px 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
    .dropdown-menu li:hover { background: #f1f5f9; }
    .has-submenu > .submenu { position: absolute; right: 100%; top: -5px; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; width: 180px; display: none; }
    .has-submenu:hover > .submenu { display: block; }

    /* 🎛️ أيقونات سوداء بدون مربعات (Minimalist) */
    .toolbar-left { display: flex; align-items: center; gap: 20px; }
    .char-counter { font-size: 0.85rem; color: #9aa1ac; font-weight: 600; }
    
    .btn-tool { background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; transition: 0.2s; color: #000; padding: 5px; }
    .btn-tool:hover:not(:disabled) { transform: scale(1.2); opacity: 0.7; }
    .btn-tool.recording { color: #ef4444; animation: pulse-mic 1.5s infinite; }
    .btn-tool:disabled { color: #e2e8f0; cursor: not-allowed; }

    /* ⚙️ اللوحة الجانبية */
    .settings-sidebar { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; }
    .settings-group { margin-bottom: 25px; border-bottom: 1px solid #f1f5f9; padding-bottom: 20px; }
    .settings-title { font-size: 0.95rem; font-weight: 700; color: #000; margin-bottom: 15px; display: flex; justify-content: space-between; }
    
    /* شريط السرعة باللون الأسود */
    .slider-container { display: flex; flex-direction: column; gap: 10px; }
    .styled-slider { width: 100%; cursor: pointer; accent-color: #000; appearance: none; height: 4px; background: #e2e8f0; border-radius: 2px; }
    .styled-slider::-webkit-slider-thumb { appearance: none; width: 16px; height: 16px; background: #000; border-radius: 50%; cursor: pointer; }
    .slider-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: #94a3b8; }

    .mode-option{padding:12px;background:#f8fafc;border:2px solid transparent;border-radius:8px;cursor:pointer;margin-bottom:8px;text-align:right;}
    .mode-option.active{border-color:#000;background:#fff;}
    .mode-title{font-weight:700;font-size:0.9rem; color:#000;}

    @keyframes pulse-mic { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
  </style>
</head>
<body data-mode="fast">

<header class="top-bar">
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="menu-btn" id="menuBtn" type="button"><i class="fas fa-bars"></i></button>
    <div class="top-logo"><h2>sl-Dubbing</h2></div>
  </div>
</header>

<main class="main-content">
  <div class="studio-container">
    <div class="studio-grid">
      
      <div class="main-editor-card">
        <textarea id="ttsInput" class="editor-textarea" placeholder="اكتب أو انسخ النص هنا... سيتم النطق من مكان وقوف المؤشر."></textarea>
        
        <div class="editor-toolbar">
          <div class="toolbar-right">
            <div class="custom-dropdown" id="langDropdown">
              <div class="dropdown-selected" id="langSelected">
                <div><span class="flag">🇸🇦</span> <span class="name">العربية (السعودية)</span></div>
                <i class="fas fa-chevron-down"></i>
              </div>
              <ul class="dropdown-menu" id="langMenu"></ul>
            </div>
          </div>
          
          <div class="toolbar-left">
            <span class="char-counter"><span id="charCount">0</span> حرف</span>
            
            <button id="ttsFixBtn" class="btn-tool" title="تدقيق النص"><i class="fas fa-wand-magic-sparkles"></i></button>
            <button id="sttMicBtn" class="btn-tool" title="إملاء صوتي"><i class="fas fa-microphone"></i></button>
            <button id="ttsDownloadBtn" class="btn-tool" title="تنزيل" disabled><i class="fas fa-download"></i></button>
            <button id="ttsStopBtn" class="btn-tool" title="إيقاف" style="display:none;"><i class="fas fa-stop"></i></button>
            <button id="ttsPlayBtn" class="btn-tool" title="تشغيل"><i class="fas fa-play"></i></button>
          </div>
        </div>
      </div>

      <div class="settings-sidebar">
        <div class="settings-group">
          <div class="settings-title"><span>الوضع (Model)</span></div>
          <div class="mode-switcher">
            <div class="mode-option active" data-mode="fast"><div class="mode-title">الوضع السريع ⚡</div></div>
            <div class="mode-option" data-mode="quality"><div class="mode-title">جودة عالية 💎</div></div>
          </div>
        </div>

        <div class="settings-group">
          <div class="settings-title"><span>السرعة (Speed)</span> <span id="speedValueTxt" style="color:#000;">طبيعي</span></div>
          <div class="slider-container">
            <input type="range" id="speedSlider" class="styled-slider" min="-50" max="50" value="0">
            <div class="slider-labels"><span>أبطأ</span><span>أسرع</span></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<div id="toasts"></div>
<script src="js/shared.js"></script>
<script src="js/languages-data.js"></script>
<script src="js/tts.js"></script>
</body>
</html>
