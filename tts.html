<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI TTS | Smart Cloudinary Sync</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f5f5f7; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 16px; width: 100%; max-width: 600px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        textarea { width: 100%; height: 120px; border: 1px solid #ddd; border-radius: 12px; padding: 15px; margin-bottom: 20px; font-size: 1rem; box-sizing: border-box; }
        .spk-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .item { padding: 15px 5px; border: 1px solid #eee; border-radius: 10px; cursor: pointer; text-align: center; font-size: 0.9rem; }
        .item.active { background: #a4fec4; border-color: black; font-weight: bold; }
        .btn { width: 100%; padding: 18px; background: black; color: white; border: none; border-radius: 30px; cursor: pointer; font-size: 1.1rem; font-weight: 600; }
        #res { margin-top: 30px; padding: 20px; border: 2px solid #065f2c; border-radius: 12px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0;">AI Smart TTS</h2>
    <textarea id="txt" placeholder="What should the AI say?"></textarea>
    
    <p style="font-weight:600; margin-bottom:10px;">Select Voice:</p>
    <div class="spk-grid" id="spkGrid">
        <div class="item active" onclick="setV('', this)">Default AI</div>
    </div>

    <button class="btn" id="goBtn" onclick="startTTS()">Generate AI Speech</button>
    
    <div id="res">
        <p style="font-weight:bold; color:#065f2c; margin-top:0;">Ready!</p>
        <audio id="aud" controls style="width:100%"></audio>
    </div>
</div>

<script>
const API_BASE = 'https://web-production-14a1.up.railway.app';
let voiceUrl = '';

document.addEventListener('DOMContentLoaded', loadVoices);

async function loadVoices() {
    const grid = document.getElementById('spkGrid');
    try {
        const res = await fetch(`${API_BASE}/api/voices`);
        const data = await res.json();
        if (data.success) {
            data.voices.forEach(v => {
                const d = document.createElement('div');
                d.className = 'item';
                d.innerText = v.name;
                d.onclick = () => setV(v.url, d);
                grid.appendChild(d);
            });
        }
    } catch(e) {}
}

function setV(url, el) {
    voiceUrl = url;
    document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
}

async function startTTS() {
    const text = document.getElementById('txt').value.trim();
    if(!text) return alert("Enter text");
    
    const btn = document.getElementById('goBtn');
    btn.disabled = true; btn.innerText = "AI is thinking...";

    try {
        const res = await fetch(`${API_BASE}/api/tts`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text, voice_url: voiceUrl, lang: 'en'}),
            credentials: 'include'
        });
        const data = await res.json();
        if (data.job_id) check(data.job_id);
    } catch (e) { btn.disabled = false; btn.innerText = "Generate AI Speech"; }
}

function check(id) {
    const timer = setInterval(async () => {
        const r = await fetch(`${API_BASE}/api/job/${id}`, {credentials: 'include'});
        const d = await r.json();
        if (d.status === 'completed') {
            clearInterval(timer);
            document.getElementById('res').style.display = 'block';
            document.getElementById('aud').src = d.audio_url;
            document.getElementById('goBtn').disabled = false;
            document.getElementById('goBtn').innerText = "Generate AI Speech";
        }
    }, 3000);
}
</script>
</body>
</html>
