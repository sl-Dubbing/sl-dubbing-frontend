<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>تحويل النص إلى صوت | sl-Dubbing Studio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* 🚀 التخطيط الجديد المستوحى من ElevenLabs */
    .studio-container { max-width: 1600px; margin: 0 auto; padding: 20px; }
    .studio-grid { display: grid; grid-template-columns: 1fr 320px; gap: 24px; align-items: start; }
    @media (max-width: 992px) { .studio-grid { grid-template-columns: 1fr; } }

    /* 📝 المحرر العملاق */
    .main-editor-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; flex-direction: column; overflow: visible; }
    .editor-textarea { width: 100%; min-height: 500px; padding: 25px; border: none; resize: vertical; font-size: 1.1rem; color: #1a1d23; background: transparent; outline: none; font-family: inherit; line-height: 1.8; }
    .editor-textarea::placeholder { color: #94a3b8; font-size: 1.5rem; font-weight: 300; }
    
    /* 🎛️ شريط الأدوات السفلي */
    .editor-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #f8fafc; border-top: 1px solid #e5e7eb; border-radius: 0 0 12px 12px; }
    
    /* 🌍 القائمة المنسدلة */
    .custom-dropdown { position: relative; user-select: none; z-index: 50; }
    .dropdown-selected { padding: 10px 15px; border-radius: 8px; border: 1px solid #cbd5e1; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 0.95rem; font-weight: 600; color: #475569; min-width: 220px; transition: 0.2s;}
    .dropdown-selected:hover { border-color: #94a3b8; }
    .dropdown-menu { position: absolute; top: 100%; right: 0; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 240px; list-style: none; padding: 5px 0; margin: 5px 0 0 0; display: none; }
    .custom-dropdown.open .dropdown-menu { display: block; animation: fadeInDown 0.2s ease-out; }
    .dropdown-menu li { padding: 10px 15px; cursor: pointer; transition: 0.2s; position: relative; font-size: 0.9rem; color: #1a1d23; display: flex; justify-content: space-between; align-items: center; }
    .dropdown-menu li:hover { background: #f1f5f9; color: #2563eb; }
    .has-submenu > .submenu { position: absolute; right: 100%; top: -5px; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 180px; list-style: none; padding: 5px 0; display: none; z-index: 101; }
    .has-submenu:hover > .submenu { display: block; animation: fadeInLeft 0.2s ease-out; }

    /* 🎛️ أدوات اليسار */
    .toolbar-left { display: flex; align-items: center; gap: 12px; }
    .char-counter { font-size: 0.85rem; color: #9aa1ac; font-weight: 600; margin-left: 10px; }
    
    .btn-tool { width: 40px; height: 40px; background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; transition: 0.2s; color: #1e293b; }
    .btn-tool:hover:not(:disabled) { transform: scale(1.15); color: #2563eb; } 
    
    /* ألوان مخصصة عند التمرير لبعض الأزرار */
    .btn-magic:hover:not(:disabled) { color: #8b5cf6; } /* عصا التصحيح (بنفسجي) */
    .btn-download:hover:not(:disabled) { color: #10b981; } /* التنزيل (أخضر) */
    
    .btn-tool.recording { animation: pulse-mic 1.5s infinite; color: #ef4444; }
    .btn-tool:disabled { color: #cbd5e1; cursor: not-allowed; transform: none; }

    /* ⚙️ اللوحة الجانبية للإعدادات */
    .settings-sidebar { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
    .settings-group { margin-bottom: 25px; border-bottom: 1px solid #f1f5f9; padding-bottom: 20px; }
    .settings-group:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .settings-title { font-size: 0.95rem; font-weight: 700; color: #1e293b; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
    
    .slider-container { display: flex; flex-direction: column; gap: 10px; }
    .styled-slider { width: 100%; cursor: pointer; accent-color: #2563eb; }
    .slider-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: #94a3b8; }

    .mode-switcher{display:flex;flex-direction:column;gap:10px;}
    .mode-option{padding:12px;background:#f8fafc;border:2px solid transparent;border-radius:8px;cursor:pointer;transition:0.2s;text-align:right;}
    .mode-option.active{background:#eff6ff;border-color:#2563eb;}
    .mode-title{font-weight:700;font-size:0.9rem; color:#1e293b; display:flex; justify-content:space-between;}
    .mode-desc{font-size:0.75rem;color:#64748b; margin-top:4px;}

    @keyframes pulse-mic { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInLeft { from { opacity: 0; transform: translateX(5px); } to { opacity: 1; transform: translateX(0); } }
  </style>
</head>
<body data-mode="fast">

<header class="top-bar">
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="menu-btn" id="menuBtn" type="button"><i class="fas fa-bars"></i></button>
    <div class="top-logo"><h2>sl-Dubbing</h2></div>
  </div>
</header>

<div class="overlay" id="overlay"></div>

<aside class="sidebar" id="sidebar">
  <nav class="sidebar-nav">
    <ul>
      <li><a href="dubbing.html"><i class="fas fa-film"></i> استوديو الدبلجة</a></li>
      <li><a href="tts.html" class="active"><i class="fas fa-microphone"></i> تحويل النص لصوت</a></li>
    </ul>
  </nav>
</aside>

<main class="main-content">
  <div class="studio-container">
    
    <div class="studio-grid">
      
      <div class="main-editor-card">
        <textarea id="ttsInput" class="editor-textarea" placeholder="اكتب أو انسخ أي نص هنا لتحويله إلى صوت نابض بالحياة..."></textarea>
        
        <div class="editor-toolbar">
          <div class="toolbar-right">
            <div class="custom-dropdown" id="langDropdown">
              <div class="dropdown-selected" id="langSelected">
                <div><span class="flag">🇸🇦</span> <span class="name">العربية (السعودية)</span></div>
                <i class="fas fa-chevron-down"></i>
              </div>
              <ul class="dropdown-menu" id="langMenu"></ul>
            </div>
          </div>
          
          <div class="toolbar-left">
            <span class="char-counter"><span id="charCount">0</span> حرف</span>
            
            <button id="ttsFixBtn" class="btn-tool btn-magic" type="button" title="تدقيق وتصحيح النص (AI)">
              <i class="fas fa-wand-magic-sparkles"></i>
            </button>

            <button id="sttMicBtn" class="btn-tool" type="button" title="كتابة بالصوت">
              <i class="fas fa-microphone"></i>
            </button>
            
            <button id="ttsDownloadBtn" class="btn-tool btn-download" type="button" title="تنزيل الصوت" disabled>
              <i class="fas fa-download"></i>
            </button>

            <button id="ttsStopBtn" class="btn-tool" type="button" title="إيقاف النطق" style="display:none;">
              <i class="fas fa-stop"></i>
            </button>

            <button id="ttsPlayBtn" class="btn-tool" type="button" title="توليد ونطق">
              <i class="fas fa-play"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="settings-sidebar">
        <div class="settings-group">
          <div class="settings-title"><span>إعدادات الصوت (Model)</span></div>
          <div class="mode-switcher">
            <div class="mode-option active" data-mode="fast">
              <div class="mode-title"><span>الوضع السريع ⚡</span></div>
              <div class="mode-desc">أصوات الذكاء الاصطناعي القياسية بسرعة فائقة</div>
            </div>
            <div class="mode-option" data-mode="quality">
              <div class="mode-title"><span>جودة عالية 💎</span></div>
              <div class="mode-desc">استنساخ بصمة صوتية مخصصة للعملاء</div>
            </div>
          </div>
        </div>

        <div class="settings-group">
          <div class="settings-title">
            <span>سرعة النطق (Speed)</span>
            <span id="speedValueTxt" style="color:#2563eb; font-size:0.85rem;">طبيعي</span>
          </div>
          <div class="slider-container">
            <input type="range" id="speedSlider" class="styled-slider" min="-50" max="50" value="0" step="5">
            <div class="slider-labels">
              <span>بطيء جداً</span>
              <span>سريع جداً</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<div id="toasts"></div>
<script src="js/shared.js"></script>
<script src="js/languages-data.js"></script>
<script src="js/tts.js"></script>
</body>
</html>
