<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart TTS | Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --purple-dark: #3A0353; --purple-light: #804A8A; --gold: #F59E51; --gold-light: #F8D299; --radius: 20px; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, var(--purple-dark), var(--purple-light)); color: #333; margin: 0; padding-bottom: 50px; min-height: 100vh;}
        .topbar { background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; color: #fff; }
        .logo-top { font-weight: 900; font-size: 1.3rem; text-decoration: none; color: #fff; }
        .logo-top span { color: var(--gold); }
        .wrap { max-width: 850px; margin: 30px auto; padding: 0 15px; }
        .card { background: rgba(255,255,255,0.95); border-radius: var(--radius); padding: 30px; margin-bottom: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        textarea { width: 100%; height: 120px; border-radius: 10px; border: 2px solid var(--purple-light); padding: 15px; font-size: 1rem; resize: vertical; }
        .btn { background: linear-gradient(to right, var(--gold-light), var(--gold)); color: var(--purple-dark); width: 100%; height: 60px; border-radius: 30px; border: none; cursor: pointer; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn:disabled { background: #ccc; cursor: not-allowed; opacity: 0.7; box-shadow: none; color: #666; }
        .spk-grid, .lang-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .item-card { padding: 15px; border-radius: 15px; border: 1px solid #ddd; text-align: center; cursor: pointer; background: #fff; transition: 0.3s;}
        .item-card.active { background: var(--purple-dark); color: #fff; border-color: var(--gold); transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .custom-voice-btn { width: 100%; background: rgba(245, 158, 81, 0.1); color: var(--purple-dark); border: 2px dashed var(--gold); padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; text-align: center; margin-bottom:20px;}
        #progressArea { display: none; margin-top: 20px; }
        .prog-bar-wrap { background: #eee; height: 12px; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .prog-bar { height: 100%; width: 0%; background: linear-gradient(to right, var(--gold), var(--gold-light)); transition: 0.5s; }
        .res-card { display: none; border: 3px solid var(--gold); text-align: center; }
        .toast { background: #ef4444; color: white; padding: 15px 20px; border-radius: 12px; position: fixed; bottom: 20px; right: 20px; font-weight: 600; z-index: 1000;}
    </style>
</head>
<body>

<div class="topbar">
    <a href="index.html" class="logo-top">sl<span>-Dubbing</span></a>
    <div id="authSection" style="font-weight:bold; color:white;">Checking...</div>
</div>

<div class="wrap">
    <div class="card">
        <h2 style="color:var(--purple-dark); margin-top:0;"><i class="fas fa-keyboard"></i> Text to Speech</h2>
        <textarea id="txt" placeholder="Enter text here to generate AI speech..."></textarea>
    </div>

    <div class="card">
        <h4 style="color:var(--purple-dark); margin-top:0;"><i class="fas fa-user-astronaut"></i> AI Voice Profile</h4>
        <div class="spk-grid" id="spkGrid"><div class="item-card active" onclick="setVoice('','',this)">Default Voice</div></div>
        
        <div class="custom-voice-btn" onclick="document.getElementById('customVoice').click()">
            <i class="fas fa-plus-circle"></i> Upload Custom Clone (WAV/MP3)
            <div id="customVoiceTxt" style="font-size:0.8rem; font-weight:normal; margin-top:5px;"></div>
        </div>
        <input type="file" id="customVoice" hidden accept="audio/*" onchange="handleCustom(this)">
    </div>

    <div class="card">
        <h4 style="color:var(--purple-dark); margin-top:0;"><i class="fas fa-language"></i> Target Language</h4>
        <div class="lang-grid" id="langGrid"></div>
    </div>

    <div class="card">
        <button class="btn" id="ttsBtn" onclick="startTTS()">Generate Audio</button>
        
        <div id="progressArea">
            <div style="display:flex; justify-content:space-between; font-weight:bold;">
                <span id="statusTxt">Connecting to AI Factory...</span><span id="pctTxt">0%</span>
            </div>
            <div class="prog-bar-wrap"><div class="prog-bar" id="progFill"></div></div>
        </div>
    </div>

    <div class="card res-card" id="resCard">
        <h3 style="color:var(--purple-dark); margin-top:0;">Generated Speech</h3>
        <audio id="ttsAud" controls style="width:100%; margin-bottom:15px;"></audio>
        <p id="finalText" style="background:#f9f9f9; padding:15px; border-radius:10px; font-style:italic; font-size:0.95rem; text-align:left; border-left: 4px solid var(--purple-light);"></p>
    </div>
</div>

<div id="toasts"></div>

<script>
const API_BASE = 'https://web-production-14a1.up.railway.app';
let selectedVoiceUrl = '', selectedVoiceId = '', customBase64 = '', selectedLang = 'ar';
let evtSource = null;

// جميع اللغات المدعومة
const LANGS = [
    {c:'ar', n:'Arabic', f:'🇸🇦'}, {c:'en', n:'English', f:'🇺🇸'},
    {c:'es', n:'Spanish', f:'🇪🇸'}, {c:'fr', n:'French', f:'🇫🇷'},
    {c:'de', n:'German', f:'🇩🇪'}, {c:'it', n:'Italian', f:'🇮🇹'},
    {c:'pt', n:'Portuguese', f:'🇵🇹'}, {c:'tr', n:'Turkish', f:'🇹🇷'},
    {c:'ru', n:'Russian', f:'🇷🇺'}, {c:'nl', n:'Dutch', f:'🇳🇱'},
    {c:'cs', n:'Czech', f:'🇨🇿'}, {c:'pl', n:'Polish', f:'🇵🇱'},
    {c:'hu', n:'Hungarian', f:'🇭🇺'}, {c:'zh', n:'Chinese', f:'🇨🇳'},
    {c:'ja', n:'Japanese', f:'🇯🇵'}, {c:'ko', n:'Korean', f:'🇰🇷'},
    {c:'hi', n:'Hindi', f:'🇮🇳'}
];

document.addEventListener('DOMContentLoaded', () => { checkAuth(); renderLangs(); loadVoices(); });

function renderLangs() {
    document.getElementById('langGrid').innerHTML = LANGS.map(l => `<div class="item-card ${l.c===selectedLang?'active':''}" onclick="setLang('${l.c}', this)"><div style="font-size:1.8rem; margin-bottom:5px;">${l.f}</div><div style="font-size:0.8rem; font-weight:bold;">${l.n}</div></div>`).join('');
}

function setLang(c, el) { 
    selectedLang = c; 
    document.querySelectorAll('#langGrid .item-card').forEach(x => x.classList.remove('active')); 
    el.classList.add('active'); 
}

async function loadVoices() {
    try {
        const r = await fetch(`${API_BASE}/api/voices`);
        const d = await r.json();
        if(d.success) d.voices.forEach(v => {
            const div = document.createElement('div'); div.className = 'item-card'; div.innerText = v.name;
            div.onclick = () => setVoice(v.url, v.name, div);
            document.getElementById('spkGrid').appendChild(div);
        });
    } catch(e){}
}

function setVoice(url, id, el) { 
    selectedVoiceUrl = url; selectedVoiceId = id; customBase64 = '';
    document.getElementById('customVoiceTxt').innerText = '';
    document.querySelectorAll('#spkGrid .item-card').forEach(x => x.classList.remove('active')); 
    if(el) el.classList.add('active'); 
}

function handleCustom(input) {
    if(input.files.length > 0) {
        document.querySelectorAll('#spkGrid .item-card').forEach(x => x.classList.remove('active'));
        selectedVoiceUrl = ''; selectedVoiceId = '';
        document.getElementById('customVoiceTxt').innerText = "Selected: " + input.files[0].name;
        const reader = new FileReader();
        reader.readAsDataURL(input.files[0]);
        reader.onload = () => { customBase64 = reader.result.split(',')[1]; };
    }
}

async function startTTS() {
    const text = document.getElementById('txt').value.trim();
    if(!text) return showToast("Please enter some text!");

    const btn = document.getElementById('ttsBtn'); btn.disabled = true;
    document.getElementById('progressArea').style.display = 'block';
    document.getElementById('resCard').style.display = 'none';

    try {
        const res = await fetch(`${API_BASE}/api/tts`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            // 🟢 استخدام المتغير selectedLang بدلاً من 'ar' الثابتة
            body: JSON.stringify({text: text, lang: selectedLang, voice_url: selectedVoiceUrl, voice_id: selectedVoiceId, sample_b64: customBase64}),
            credentials: 'include'
        });
        const data = await res.json();
        if(data.success) startSSE(data.job_id);
        else throw new Error(data.error);
    } catch(e) { showToast(e.message); btn.disabled = false; }
}

function startSSE(jobId) {
    if (evtSource) evtSource.close();
    evtSource = new EventSource(`${API_BASE}/api/progress/${jobId}`, { withCredentials: true });

    evtSource.onmessage = function(event) {
        const data = JSON.parse(event.data);
        document.getElementById('progFill').style.width = data.progress + '%';
        document.getElementById('pctTxt').innerText = data.progress + '%';
        document.getElementById('statusTxt').innerText = "Status: " + data.status;

        if (data.status === 'done' || data.status === 'completed') {
            evtSource.close();
            document.getElementById('resCard').style.display = 'block';
            document.getElementById('ttsAud').src = data.audio_url;
            document.getElementById('finalText').innerText = data.final_text || "";
            document.getElementById('ttsBtn').disabled = false;
            checkAuth();
        } else if (data.status === 'failed' || data.status === 'error') {
            evtSource.close(); showToast("Processing Failed."); document.getElementById('ttsBtn').disabled = false;
        }
    };
    evtSource.onerror = function() { evtSource.close(); };
}

async function checkAuth() {
    try {
        const r = await fetch(`${API_BASE}/api/user`, { credentials: 'include' });
        const d = await r.json();
        if(d.success) document.getElementById('authSection').innerHTML = `${d.user.name} | ${d.user.credits} 💰`;
        else document.getElementById('authSection').innerHTML = `<a href="login.html" style="color:#fff; text-decoration:none;">Login</a>`;
    } catch(e) { document.getElementById('authSection').innerHTML = `<a href="login.html" style="color:#fff; text-decoration:none;">Login</a>`; }
}

function showToast(msg) {
    const t = document.getElementById('toasts');
    const box = document.createElement('div'); box.className = 'toast'; box.innerText = msg;
    t.appendChild(box); setTimeout(() => box.remove(), 4000);
}
</script>
</body>
</html>
