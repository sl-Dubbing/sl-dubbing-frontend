<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>sl-Dubbing Studio | TTS Pro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* 🚀 تصميم ElevenLabs كامل الشاشة */
    .studio-container { max-width: 1600px; margin: 0 auto; padding: 20px; }
    .studio-grid { display: grid; grid-template-columns: 1fr 320px; gap: 24px; }
    
    .main-editor-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; display: flex; flex-direction: column; overflow: visible; }
    .editor-textarea { width: 100%; min-height: 550px; padding: 25px; border: none; resize: vertical; font-size: 1.15rem; color: #000; outline: none; line-height: 1.8; }
    
    .editor-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #fcfcfc; border-top: 1px solid #eee; border-radius: 0 0 12px 12px; }
    
    /* أيقونات سوداء نقيّة Minimal */
    .toolbar-left { display: flex; align-items: center; gap: 20px; }
    .btn-tool { background: transparent; border: none; cursor: pointer; font-size: 1.4rem; color: #000; transition: 0.2s; padding: 5px; }
    .btn-tool:hover:not(:disabled) { opacity: 0.5; transform: scale(1.1); }
    .btn-tool:disabled { color: #ddd; }
    .active-mic { color: #ef4444; }

    /* شريط السرعة الأسود */
    .styled-slider { width: 100%; accent-color: #000; appearance: none; height: 3px; background: #eee; cursor: pointer; }
    .styled-slider::-webkit-slider-thumb { appearance: none; width: 14px; height: 14px; background: #000; border-radius: 50%; }

    /* تخصيص القائمة المنسدلة لتفتح للأسفل دائماً */
    .custom-dropdown { position: relative; z-index: 100; }
    .dropdown-selected { padding: 10px 15px; border: 1px solid #eee; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; min-width: 220px; font-weight: bold; }
    .dropdown-menu { position: absolute; top: 100%; right: 0; background: #fff; border: 1px solid #eee; border-radius: 8px; width: 240px; display: none; margin-top: 5px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .custom-dropdown.open .dropdown-menu { display: block; }
    
    /* 🌳 قائمة اللهجات الفرعية */
    .has-submenu > .submenu { position: absolute; right: 100%; top: 0; background: #fff; border: 1px solid #eee; border-radius: 8px; width: 180px; display: none; }
    .has-submenu:hover > .submenu { display: block; }

    /* الشريط الجانبي (Sidebar) مطابق لصفحة الدبلجة */
    .sidebar { transition: 0.3s ease; z-index: 1001; transform: translateX(100%); }
    .sidebar.open { transform: translateX(0); }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; }
    .overlay.active { display: block; }
  </style>
</head>
<body data-mode="fast">

<header class="top-bar">
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="menu-btn" onclick="openSidebar()"><i class="fas fa-bars"></i></button>
    <div class="top-logo"><h2>sl-Dubbing</h2></div>
  </div>
</header>

<div class="overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-user-section">
    <button onclick="closeSidebar()" style="background:none; border:none; color:#9aa1ac; cursor:pointer; font-size:1.2rem;"><i class="fas fa-times"></i></button>
    <div style="margin-top:10px;">استوديو المحترفين</div>
  </div>
  <nav class="sidebar-nav">
    <ul>
      <li><a href="dubbing.html"><i class="fas fa-film"></i> الدبلجة الذكية</a></li>
      <li><a href="tts.html" class="active"><i class="fas fa-microphone"></i> تحويل النص لصوت</a></li>
    </ul>
  </nav>
</aside>

<main class="main-content">
  <div class="studio-container">
    <div class="studio-grid">
      <div class="main-editor-card">
        <textarea id="ttsInput" class="editor-textarea" placeholder="ضع المؤشر في أي مكان للبدء بالقراءة..."></textarea>
        <div class="editor-toolbar">
          <div class="custom-dropdown" id="langDropdown">
            <div class="dropdown-selected" id="langSelected">
              <div><span class="flag">🇸🇦</span> <span class="name">العربية (السعودية)</span></div>
              <i class="fas fa-chevron-down"></i>
            </div>
            <ul class="dropdown-menu" id="langMenu"></ul>
          </div>
          <div class="toolbar-left">
            <span class="char-counter"><span id="charCount">0</span> حرف</span>
            <button id="ttsFixBtn" class="btn-tool" title="تدقيق ذكي (AI)"><i class="fas fa-wand-magic-sparkles"></i></button>
            <button id="sttMicBtn" class="btn-tool" title="إملاء"><i class="fas fa-microphone"></i></button>
            <button id="ttsDownloadBtn" class="btn-tool" title="تنزيل كامل"><i class="fas fa-download"></i></button>
            <button id="ttsStopBtn" class="btn-tool" title="إيقاف" style="display:none;"><i class="fas fa-stop"></i></button>
            <button id="ttsPlayBtn" class="btn-tool" title="تشغيل"><i class="fas fa-play"></i></button>
          </div>
        </div>
      </div>
      <div class="settings-sidebar">
        <div class="settings-group">
          <div style="font-weight:800; margin-bottom:10px;">السرعة (Speed)</div>
          <input type="range" id="speedSlider" class="styled-slider" min="-50" max="50" value="0">
          <div style="display:flex; justify-content:space-between; font-size:0.7rem; color:#999; margin-top:5px;"><span>أبطأ</span><span id="speedVal">طبيعي</span><span>أسرع</span></div>
        </div>
        <div class="mode-option active" data-mode="fast">الوضع السريع ⚡</div>
        <div class="mode-option" data-mode="quality">جودة عالية 💎</div>
      </div>
    </div>
  </div>
</main>

<div id="toasts"></div>
<script>
  // وظائف الشريط الجانبي (مطابقة لصفحة الدبلجة)
  function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('active'); }
  function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('active'); }
</script>
<script src="js/shared.js"></script>
<script src="js/languages-data.js"></script>
<script src="js/tts.js"></script>
</body>
</html>
